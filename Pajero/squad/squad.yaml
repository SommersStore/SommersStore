  - oficina-digital

components:
  tasks:
    - diagnostico-inicial.md
    - motor-consumo-lenta.md
    - cambio-v5a51.md
    - transfer-diferenciais.md
    - suspensao-direcao.md
    - freios-seguranca.md
    - imagens-diagramas.md
    - qa-final.md
  agents:
    - pajero-chief-diagnostician.md
    - oem-technical-librarian.md
    - evidence-anti-hallucination-auditor.md
