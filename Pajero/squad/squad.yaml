    - driveability-electronics-diagnostician.md
    - engine-6g75-practical-mechanic.md
    - transmission-v5a51-specialist.md
    - super-select-drivetrain-specialist.md
    - suspension-hydraulic-steering-engineer.md
    - brake-road-safety-inspector.md
    - visual-teardown-mapper.md
    - work-order-parts-planner.md
  workflows:
    - workflow-diagnostico-inicial.md
    - workflow-motor-consumo-lenta.md
