# AIOX Clone Routing Matrix
# Esta matriz define exatamente quando cada inteligência deve ser evocada pelos agentes do sistema.

clones:
  - id: "alan_nicolas"
    name: "Alan Nicolas (O Orquestrador)"
    role: "AIOX Mastermind, Estrategista Lógico"
    triggers:
      - "O produto envolve produtividade, escala ou automação."
      - "A copy precisa de um argumento extremamente lógico ( ancoragem matemática de preço )."
      - "O projeto envolve ferramentas de IA, agentes autônomos ou operações de negócios complexas."
    associated_agents: ["@aiox-master", "@analyst"]

  - id: "tiago_finch"
    name: "Tiago Finch (O Outlier)"
    role: "Posicionamento Arrogante, Fuga do Sistema"
    triggers:
      - "O produto vende lifestyle, High-Ticket, libertação da CLT ou enriquecimento agressivo."
      - "A copy precisa de um 'inimigo em comum' (o sistema, a mediocridade)."
      - "A página usa o Design System 'Dark Cockpit' ou 'Golden Luxury' combinada com fotos de status."
    associated_agents: ["@copywriter", "@po"]

  - id: "gary_halbert"
    name: "Gary Halbert (O Copywriter Implacável)"
    role: "Mestre em Direção de Resposta e Atenção (AIDA)"
    triggers:
      - "Sempre que estivermos construindo a Headline principal e a Subheadline (O Gancho)."
      - "O foco da copy for converter imediatamente, sem distrações."
      - "Escrita de anúncios (Ads) ou VSLs que focam em uma dor gigantesca e urgente."
    associated_agents: ["@copywriter"]

  - id: "elisa_clark"
    name: "Elisa Clark (A Persona / Expert Terapêutica)"
    role: "Rosto e Voz da SommersStore para Públicos de Bem-Estar e Estética"
    triggers:
      - "O produto é focado no público feminino."
      - "A página exige um tom de voz acolhedor, sofisticado e orgânico."
      - "A venda é sobre transformação interna, curas, rituais, estética e calma (Ex: Sais de Banho)."
    associated_agents: ["@copywriter", "@pm"]

  - id: "elida_dias"
    name: "Elida Dias (A Rainha da Continuidade)"
    role: "Especialista em Funil de Lucro Infinito e Upsells"
    triggers:
      - "Sempre que estivermos construindo um OTO (One Time Offer) ou Upsell."
      - "O produto for desenhado para criar receita recorrente ou esteira de produtos."
      - "Copy focada em transição suave de um infoproduto barato (Ebook) para um mais caro (Mentoria/Curso)."
    associated_agents: ["@copywriter", "@analyst"]

  - id: "julian_art"
    name: "Julian (The Luxury Art Director)"
    role: "Especialista em Experiência Estética e Conversão Silenciosa"
    triggers:
      - "Na fase de 'Visual Alchemy' quando o conteúdo já está pronto e precisa ser envelopado."
      - "Para decidir qual Design System (Golden, Obsidian, Zen, Cockpit) aplicar ao projeto."
      - "Geração de prompts midjourney/dalle de altíssimo padrão."
    associated_agents: ["@ux-design-expert", "@dev"]

  - id: "david_ogilvy"
    name: "David Ogilvy (O Pai da Publicidade)"
    role: "Big Idea, Pesquisa Profunda e Copy que Constrói Marca"
    triggers:
      - "O projeto exige uma Big Idea central que unifique toda a campanha."
      - "Precisamos de copy que construa marca a longo prazo, não só converta imediatamente."
      - "O produto precisa de demonstração concreta e especificidade como prova de credibilidade."
    associated_agents: ["@copywriter", "@brand-master"]

  - id: "eugene_schwartz"
    name: "Eugene Schwartz (O Arquiteto de Mercados)"
    role: "5 Níveis de Consciência e Sofisticação de Mercado"
    triggers:
      - "Na fase de pesquisa de mercado, para diagnosticar o nível de consciência da compradora."
      - "Quando a copy não está convertendo e precisamos calibrar o ponto de entrada da mensagem."
      - "Para produtos novos no mercado que precisam criar desejo antes de vender solução."
    associated_agents: ["@copywriter", "@analyst", "@marketing"]

  - id: "alex_hormozi"
    name: "Alex Hormozi (O Arquiteto de Ofertas)"
    role: "Grand Slam Offer, Value Stack e Ancoragem de Preço"
    triggers:
      - "Sempre que estamos estruturando ou revisando a oferta principal, bumps e OTOs."
      - "O preço parece alto para o mercado e precisamos aumentar o valor percebido sem desconto."
      - "Construção do value stack de bônus com ancoragem de preço e garantia de risco zero."
    associated_agents: ["@copywriter", "@marketing", "@cro-expert"]

  - id: "jeff_walker"
    name: "Jeff Walker (O Arquiteto de Lançamentos)"
    role: "Product Launch Formula e Sequências PLF"
    triggers:
      - "Sempre que um novo produto ou edição especial vai ao mercado (abertura de carrinho)."
      - "Criação do calendário de pré-lançamento com PLC (Pre-Launch Content) em 3 peças."
      - "Mapeamento dos gatilhos mentais por dia no período de carrinho aberto."
    associated_agents: ["@email-specialist", "@marketing", "@social-content"]

  - id: "joanna_wiebe"
    name: "Joanna Wiebe (A Mineradora de Linguagem)"
    role: "Voice of Customer, VoC Research e Conversion Copywriting"
    triggers:
      - "SEMPRE antes de escrever qualquer copy — deve entregar o relatório VoC primeiro."
      - "Quando a copy está genérica e não ressoa com o público real."
      - "Estruturação de Jobs-to-be-Done (JTBD) e pesquisa em reviews de concorrentes."
    associated_agents: ["@copywriter", "@analyst", "@email-specialist"]

  - id: "frank_kern"
    name: "Frank Kern (O Conversador)"
    role: "Email Marketing Relacional e Mass Control"
    triggers:
      - "Criação de sequências de email de boas-vindas, nutrição e carrinho abandonado."
      - "O tom dos emails está corporativo ou distante — precisamos humanizar a voz."
      - "Aplicação do State of Being copy: fazer a leitora sentir o resultado antes de comprar."
    associated_agents: ["@email-specialist", "@copywriter"]
