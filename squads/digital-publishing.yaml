name: Digital Publishing Squad
id: digital-publishing
description: "Equipe especializada na tradução da Copy de Elite para o formato de Dossier Digital (PDF de Luxo), cuidando da integridade técnica e tipográfica."
leader: arch-master

members:
  - agent: elisa-clark
    role: "Chefe Alquimista - Garante que o texto seja coeso, botânico e fiel ao universo de luxo. (Ref. clones/elisa_clark.md)"
  - agent: ux-design-expert
    role: "Brand Guardian - Valida se as fontes e paletas seguem o padrão Nightshade V3. (Ref. clones/ux-design-expert.md)"
  - agent: dev
    role: "PDF Engineer (@pub) - Responsável pela codificação do gerador Node/Puppeteer e aplicação das regras da Skill 'Ebook-Publisher'."

workflow:
  trigger: "Sempre que um novo volume de conteúdo (como as 12 receitas do cofre) é finalizado para exportação em PDF."
  steps:
    - step: 1
      action: "@elisa-clark valida a 'Source of Truth' em original_master_at_2026_03_31.md contra a Janela de Contexto."
    - step: 2
      action: "@ux-design-expert inspeciona o template HTML e o CSS de tipografia."
    - step: 3
      action: "@dev (Dex) executa o comando `node generate.js` e gera a prova final."
  success_criteria: "PDF de Luxo gerado com 30+ páginas, sem textos esmagados, com sumário funcional e tipografia de 12pt+."
