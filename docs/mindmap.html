<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;900&display=swap');

  :root {
    --gold: #6366f1; /* Indigo (Estilo n8n/AIOX) */
    --green: #10b981; 
    --blue: #3b82f6; 
    --red: #ef4444;
    --dark: #0b0b0e; /* Deep Black Background */
    --card: #1e1e26; /* Dark Node Background */
    --border: #33333e; /* Dark Border */
    --text: #ffffff; /* White Text */
    --muted: #a1a1aa; /* Zinc Muted Text */
    --line: rgba(99, 102, 241, 0.4); /* Indigo Glow em conexões */
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Inter', sans-serif;
    background: var(--dark);
    color: var(--text);
    height: 100vh;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  /* HEADER */
  .studio-header {
    background: rgba(11, 11, 14, 0.8);
    backdrop-filter: blur(15px);
    padding: 12px 24px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    z-index: 1000;
    color: white;
  }

  .logo { font-size: 1.1rem; font-weight: 900; }
  .logo span { color: var(--gold); }

  .actions { display: flex; gap: 8px; }
  .btn {
    padding: 6px 12px;
    border-radius: 6px;
    font-size: 0.75rem;
    font-weight: 600;
    cursor: pointer;
    border: 1px solid transparent;
    transition: all 0.2s;
  }
  .btn-outline { border-color: var(--border); background: transparent; color: var(--text); }
  .btn-outline:hover { background: var(--card); }
  .btn-danger { background: rgba(239, 68, 68, 0.1); color: var(--red); }

  /* WORKSPACE */
  #viewport {
    flex-grow: 1;
    position: relative;
    overflow: hidden;
    cursor: grab;
    background-color: var(--dark);
    background-image: radial-gradient(rgba(255, 255, 255, 0.08) 1px, transparent 1px);
    background-size: 25px 25px;
  }
  #viewport:active { cursor: grabbing; }

  #canvas {
    position: absolute;
    transform-origin: 0 0;
    width: 5000px;
    height: 5000px;
  }

  svg#lines-layer {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
  }

  /* NODES */
  .node {
    position: absolute;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px;
    width: 280px;
    box-shadow: 0 10px 40px rgba(0,0,0,0.6);
    z-index: 2;
    transition: transform 0.2s, border-color 0.2s;
  }
  .node:hover { 
    border-color: var(--gold); 
    box-shadow: 0 0 20px rgba(99, 102, 241, 0.2);
    transform: translateY(-2px);
  }

  .node-header { display: flex; align-items: center; gap: 12px; margin-bottom: 12px; }
  .node-icon { 
    font-size: 1rem; 
    background: #2d2d3a; 
    width: 32px; 
    height: 32px; 
    border-radius: 50%; 
    display: flex; 
    align-items: center; 
    justify-content: center;
  }
  .node-title { font-weight: 700; font-size: 0.85rem; flex-grow: 1; outline: none; color: white; }

  .status-dot { width: 10px; height: 10px; border-radius: 50%; cursor: pointer; }
  .status-todo { background: var(--muted); }
  .status-active { background: var(--gold); box-shadow: 0 0 10px var(--gold); }
  .status-done { background: var(--green); }

  .node-desc { font-size: 0.75rem; color: var(--muted); margin-bottom: 12px; line-height: 1.4; outline: none; }

  .task-list { list-style: none; border-top: 1px solid var(--border); padding-top: 10px; }
  .task-item { display: flex; align-items: flex-start; gap: 8px; font-size: 0.75rem; margin-bottom: 6px; }
  .task-check {
    width: 14px; height: 14px; border: 1.5px solid var(--border); border-radius: 3px;
    cursor: pointer; flex-shrink: 0; margin-top: 2px;
    display: flex; align-items: center; justify-content: center; font-size: 10px;
  }
  .task-item.checked .task-check { background: var(--green); border-color: var(--green); color: white; }
  .task-item.checked .task-text { color: var(--green); text-decoration: line-through; opacity: 0.6; }

  /* TASK DESC EXPANSION */
  .task-text { cursor: pointer; user-select: none; }
  .task-desc { 
    font-size: 0.7rem; 
    color: var(--muted); 
    padding-left: 0px; 
    padding-top: 4px;
    padding-bottom: 8px; 
    max-height: 0; 
    overflow: hidden; 
    transition: all 0.3s ease;
    width: 100%;
    opacity: 0;
  }
  .task-item.expanded .task-desc {
    max-height: 150px;
    opacity: 1;
  }
  .task-item { flex-wrap: wrap; cursor: pointer; }

  /* CENTER NODE */
  .center-node {
    position: absolute;
    background: linear-gradient(135deg, var(--gold), #818cf8);
    color: white;
    padding: 16px 36px;
    border-radius: 50px;
    font-weight: 900;
    font-size: 1rem;
    z-index: 10;
    box-shadow: 0 0 40px rgba(99, 102, 241, 0.5);
    white-space: nowrap;
    text-transform: uppercase;
    letter-spacing: 2px;
    border: 2px solid rgba(255,255,255,0.2);
  }

  /* SKILLS DRAWER */
  #skills-drawer {
    position: fixed; top: 0; right: -450px; width: 450px; height: 100vh;
    background: var(--card); border-left: 1px solid var(--border);
    transition: right 0.4s cubic-bezier(0.4, 0, 0.2, 1); z-index: 3000;
    display: flex; flex-direction: column; box-shadow: -10px 0 30px rgba(0,0,0,0.5);
    color: white;
  }
  #skills-drawer.open { right: 0; }
  .drawer-header { padding: 20px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; background: var(--dark); }
  .drawer-content { flex-grow: 1; overflow-y: auto; padding: 20px; background: var(--card); }
  .skill-search { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid var(--border); background: var(--dark); color: white; margin-bottom: 20px; }
  
  .skill-group { margin-bottom: 25px; }
  .skill-group-title { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 1px; color: var(--gold); margin-bottom: 15px; font-weight: 900; }
  
  .skill-acc { border: 1px solid var(--border); border-radius: 8px; margin-bottom: 8px; overflow: hidden; background: var(--dark); }
  .skill-acc-header { padding: 12px 16px; background: rgba(255,255,255,0.02); cursor: pointer; display: flex; justify-content: space-between; align-items: center; font-size: 0.8rem; font-weight: 700; color: white; }
  .skill-acc-desc { padding: 0; height: 0; overflow: hidden; font-size: 0.75rem; line-height: 1.5; color: var(--muted); transition: all 0.2s ease; background: var(--card); }
  .skill-acc.active .skill-acc-desc { padding: 12px 16px; height: auto; border-top: 1px solid var(--border); }
  .skill-acc.active .skill-acc-header { color: var(--gold); background: rgba(99, 102, 241, 0.1); }

  /* CONTROLS */
  .controls { position: fixed; bottom: 24px; left: 24px; display: flex; flex-direction: column; gap: 8px; z-index: 2000; }
  .ctrl-btn { width: 42px; height: 42px; background: var(--card); border: 1px solid var(--border); color: var(--text); font-size: 1.1rem; border-radius: 10px; cursor: pointer; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }

  #tabs { display: flex; gap: 8px; }
  .tab { padding: 8px 16px; background: transparent; color: var(--muted); font-size: 0.75rem; font-weight: 800; cursor: pointer; border-radius: 8px; transition: 0.2s; }
  .tab.active { color: white; background: var(--gold); box-shadow: 0 0 15px rgba(99, 102, 241, 0.4); }

  .save-note { position: fixed; top: 80px; left: 50%; transform: translateX(-50%); background: #10b981; color: white; padding: 10px 24px; border-radius: 30px; font-weight: 700; font-size: 0.8rem; opacity: 0; transition: 0.3s; pointer-events: none; z-index: 4000; }
  .save-note.show { opacity: 1; }

  path.link { fill: none; stroke: var(--line); stroke-width: 2.5; stroke-dasharray: 6; animation: dash 35s linear infinite; }
  @keyframes dash { from { stroke-dashoffset: 1000; } to { stroke-dashoffset: 0; } }
</style>

// STATE
let store = JSON.parse(localStorage.getItem('ss_mindmap_v8')) || JSON.parse(JSON.stringify(originalDefaultData));
let activeProjId = store.projects[0].id;
let zoom = 0.8;
let panX = -2500 * zoom + window.innerWidth/2;
let panY = -2500 * zoom + window.innerHeight/2;
let isPanning = false;
let startX, startY;

// DOM
const canvas = document.getElementById('canvas');
const linesLayer = document.getElementById('lines-layer');
const nodesContainer = document.getElementById('nodes-container');

function render() {
  const project = store.projects.find(p => p.id === activeProjId);
  if (!project) return;

  // Tabs
  const tabs = document.getElementById('tabs');
  tabs.innerHTML = '';
  store.projects.forEach(p => {
    const btn = document.createElement('div');
    btn.className = `tab ${p.id === activeProjId ? 'active' : ''}`;
    btn.innerText = p.name;
    btn.onclick = () => { activeProjId = p.id; render(); resetView(); };
    tabs.appendChild(btn);
  });

  nodesContainer.innerHTML = '';

  // Center Node
  const center = document.createElement('div');
  center.className = 'center-node';
  center.style.left = '2500px';
  center.style.top = '2500px';
  center.contentEditable = true;
  center.innerText = project.name;
  center.onblur = (e) => { project.name = e.target.innerText; render(); };
  nodesContainer.appendChild(center);

  // Phases
  project.nodes.forEach(n => {
    const div = document.createElement('div');
    div.className = 'node';
    div.style.left = n.x + 'px';
    div.style.top = n.y + 'px';
    div.innerHTML = `
      <div class="node-header">
        <span class="node-icon">${n.icon}</span>
        <span class="node-title" contenteditable="true">${n.title}</span>
        <div class="status-dot status-${n.status}"></div>
      </div>
      <div class="node-desc" contenteditable="true">${n.desc || 'Sem descrição...'}</div>
      <ul class="task-list">
        ${n.tasks.map((t, idx) => `
          <li class="task-item ${t.checked ? 'checked' : ''} ${t.expanded ? 'expanded' : ''}" onclick="toggleTaskDesc('${n.id}', ${idx})">
            <div class="task-check" onclick="event.stopPropagation(); toggleTask('${n.id}', ${idx})">${t.checked ? '✓' : ''}</div>
            <div class="task-text">${t.text}</div>
            <div class="task-desc">${t.desc || 'Informação adicional sobre esta habilidade ou fase.'}</div>
          </li>
        `).join('')}
      </ul>
      <div style="font-size:10px; color:var(--gold); cursor:pointer; margin-top:8px" onclick="addTask('${n.id}')">+ tarefa</div>
    `;

    // Drag
    let dStart = null;
    div.onmousedown = (e) => {
      if (e.target.contentEditable === "true") return;
      e.stopPropagation();
      dStart = { x: e.clientX, y: e.clientY, nx: n.x, ny: n.y };
      const mv = (me) => {
        n.x = dStart.nx + (me.clientX - dStart.x) / zoom;
        n.y = dStart.ny + (me.clientY - dStart.y) / zoom;
        div.style.left = n.x + 'px';
        div.style.top = n.y + 'px';
        updateLines();
      };
      const up = () => { window.removeEventListener('mousemove', mv); window.removeEventListener('mouseup', up); };
      window.addEventListener('mousemove', mv);
      window.addEventListener('mouseup', up);
    };

    div.querySelector('.node-title').onblur = (e) => { n.title = e.target.innerText; updateLines(); };
    div.querySelector('.node-desc').onblur = (e) => { n.desc = e.target.innerText; };
    div.querySelector('.status-dot').onclick = () => {
      const s = ['todo', 'active', 'done'];
      n.status = s[(s.indexOf(n.status) + 1) % 3];
      render();
    };

    nodesContainer.appendChild(div);
  });

  updateLines();
  applyTransform();
}

function updateLines() {
  const project = store.projects.find(p => p.id === activeProjId);
  linesLayer.innerHTML = '';
  project.nodes.forEach(n => {
    const path = document.createElementNS("http://www.w3.org/2000/svg", "path");
    const cx = 2500 + 100, cy = 2500 + 30;
    const nx = n.x, ny = n.y + 20; // Conecta na lateral esquerda do nó
    path.setAttribute("d", `M ${cx} ${cy} C ${(cx+nx)/2} ${cy}, ${(cx+nx)/2} ${ny}, ${nx} ${ny}`);
    path.setAttribute("class", "link");
    linesLayer.appendChild(path);
  });
}

function applyTransform() {
  canvas.style.transform = `translate(${panX}px, ${panY}px) scale(${zoom})`;
}

// INTERACTIONS
window.onmousedown = (e) => {
  if (e.target.closest('.node') || e.target.closest('.controls') || e.target.closest('.studio-header') || e.target.closest('#skills-drawer')) return;
  isPanning = true;
  startX = e.clientX - panX;
  startY = e.clientY - panY;
};
window.onmousemove = (e) => {
  if (!isPanning) return;
  panX = e.clientX - startX;
  panY = e.clientY - startY;
  applyTransform();
};
window.onmouseup = () => isPanning = false;

window.onwheel = (e) => {
  if (e.target.closest('#skills-drawer')) return;
  const s = e.deltaY > 0 ? -0.05 : 0.05;
  const nz = Math.min(Math.max(zoom + s, 0.1), 3);
  const ratio = nz / zoom;
  panX = e.clientX - (e.clientX - panX) * ratio;
  panY = e.clientY - (e.clientY - panY) * ratio;
  zoom = nz;
  applyTransform();
};

function adjustZoom(s) {
  const nz = Math.min(Math.max(zoom + s, 0.1), 3);
  const ratio = nz / zoom;
  panX = window.innerWidth/2 - (window.innerWidth/2 - panX) * ratio;
  panY = window.innerHeight/2 - (window.innerHeight/2 - panY) * ratio;
  zoom = nz;
  applyTransform();
}

function resetView() {
  zoom = 0.8;
  panX = -2500 * zoom + window.innerWidth/2;
  panY = -2500 * zoom + window.innerHeight/2;
  applyTransform();
}

function toggleTask(nid, tidx) {
  const n = store.projects.find(p => p.id === activeProjId).nodes.find(node => node.id == nid);
  n.tasks[tidx].checked = !n.tasks[tidx].checked;
  render();
}

function toggleTaskDesc(nid, tidx) {
  const n = store.projects.find(p => p.id === activeProjId).nodes.find(node => node.id == nid);
  n.tasks[tidx].expanded = !n.tasks[tidx].expanded;
  render();
}

function addTask(nid) {
  const n = store.projects.find(p => p.id === activeProjId).nodes.find(node => node.id == nid);
  n.tasks.push({ text: "Nova tarefa", checked: false, desc: "Pequena descrição da tarefa..." });
  render();
}

function addNode() {
  const p = store.projects.find(proj => proj.id === activeProjId);
  p.nodes.push({ id: Date.now(), x: 2500 + (Math.random()*400-200), y: 2500 + (Math.random()*400-200), icon: "📌", title: "Nova Fase", status: "todo", tasks: [] });
  render();
}

function saveData() {
  localStorage.setItem('ss_mindmap_v8', JSON.stringify(store));
  const note = document.getElementById('save-note');
  note.classList.add('show');
  setTimeout(() => note.classList.remove('show'), 2000);
}

function resetData() {
  if(confirm("Resetar para o modelo original?")) {
    store = JSON.parse(JSON.stringify(originalDefaultData));
    localStorage.removeItem('ss_mindmap_v8');
    render();
    resetView();
  }
}

// SKILLS
function toggleSkills() {
  const dr = document.getElementById('skills-drawer');
  dr.classList.toggle('open');
  if (dr.classList.contains('open')) renderSkills();
}

function renderSkills(f = '') {
  const cont = document.getElementById('skills-list');
  cont.innerHTML = '';
  skillsLibrary.forEach(cat => {
    const fil = cat.skills.filter(s => s.name.toLowerCase().includes(f.toLowerCase()));
    if (!fil.length) return;
    const g = document.createElement('div');
    g.className = 'skill-group';
    g.innerHTML = `<div class="skill-group-title">${cat.cat}</div>`;
    fil.forEach(s => {
      const item = document.createElement('div');
      item.className = 'skill-acc';
      item.innerHTML = `<div class="skill-acc-header" onclick="this.parentElement.classList.toggle('active')"><span>${s.name}</span><span>+</span></div><div class="skill-acc-desc">${s.desc}</div>`;
      g.appendChild(item);
    });
    cont.appendChild(g);
  });
}

function filterSkills(v) { renderSkills(v); }

window.onload = () => {
    // Sincronizar com Arquitetura Real
    if (!store.projects.find(p => p.id === 'arq')) {
        store.projects.unshift(originalDefaultData.projects[0]);
    }
    render();
    resetView();
};
