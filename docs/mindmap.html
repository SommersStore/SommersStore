<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>SommersStore — Mindmap Studio</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;900&display=swap');

  :root {
    --gold: #f5c842;
    --green: #22c55e;
    --blue: #3b82f6;
    --purple: #a855f7;
    --red: #ef4444;
    --orange: #f97316;
    --dark: #0b0f1a;
    --card: #161b2e;
    --card-hover: #1e253d;
    --border: #2d334a;
    --text: #e2e8f0;
    --muted: #94a3b8;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Inter', sans-serif;
    background: var(--dark);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* TOOLBAR */
  .studio-header {
    background: rgba(11, 15, 26, 0.8);
    backdrop-filter: blur(12px);
    padding: 15px 40px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 1000;
  }

  .logo { font-size: 1.3rem; font-weight: 900; letter-spacing: -1px; }
  .logo span { color: var(--gold); }

  .actions { display: flex; gap: 12px; }
  .btn {
    padding: 8px 16px;
    border-radius: 8px;
    font-size: 0.8rem;
    font-weight: 600;
    cursor: pointer;
    border: 1px solid transparent;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    gap: 6px;
    text-decoration: none;
    color: white;
  }
  .btn-primary { background: var(--gold); color: #000; }
  .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 4px 15px rgba(245, 200, 66, 0.4); }
  .btn-outline { border-color: var(--border); background: transparent; color: var(--text); }
  .btn-outline:hover { background: var(--card); border-color: var(--gold); }
  .btn-danger { background: rgba(239, 68, 68, 0.1); color: var(--red); border-color: rgba(239, 68, 68, 0.2); }
  .btn-danger:hover { background: var(--red); color: white; }

  /* TABS */
  .tabs-container {
    padding: 20px 40px 0;
    background: var(--dark);
    display: flex;
    align-items: center;
    gap: 10px;
    border-bottom: 1px solid var(--border);
  }
  .tab {
    padding: 12px 24px;
    font-size: 0.85rem;
    font-weight: 700;
    color: var(--muted);
    cursor: pointer;
    border-bottom: 2px solid transparent;
    transition: all 0.3s;
  }
  .tab:hover { color: var(--text); }
  .tab.active { color: var(--gold); border-bottom-color: var(--gold); }

  /* CONTENT */
  .content { padding: 40px; max-width: 1400px; margin: 0 auto; display: none; }
  .content.active { display: block; animation: fadeIn 0.4s ease; }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .section-header { margin-bottom: 30px; }
  .section-header h2 { font-size: 2rem; font-weight: 900; margin-bottom: 8px; }
  .section-header p { color: var(--muted); font-size: 1rem; }

  /* GRID */
  .mindmap-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
    gap: 25px;
  }

  /* CARDS */
  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 24px;
    position: relative;
    transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    display: flex;
    flex-direction: column;
    min-height: 250px;
  }
  .card:hover { border-color: var(--gold); transform: scale(1.02); box-shadow: 0 10px 30px rgba(0,0,0,0.5); }

  .card-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 12px; }
  .card-icon { font-size: 1.8rem; margin-bottom: 12px; display: block; }
  
  .card-title {
    font-size: 1.1rem;
    font-weight: 800;
    margin-bottom: 8px;
    color: #fff;
    outline: none;
    border-radius: 4px;
    padding: 2px 4px;
    border: 1px solid transparent;
  }
  .card-title:focus { background: rgba(255,255,255,0.05); border-color: var(--gold); }

  .card-desc {
    font-size: 0.85rem;
    color: var(--muted);
    line-height: 1.6;
    margin-bottom: 20px;
    flex-grow: 1;
    outline: none;
    padding: 2px 4px;
    border: 1px solid transparent;
  }
  .card-desc:focus { background: rgba(255,255,255,0.05); border-color: var(--gold); }

  /* TASKS */
  .task-list { list-style: none; margin-bottom: 20px; border-top: 1px solid var(--border); padding-top: 15px; }
  .task-item {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 10px;
    font-size: 0.85rem;
    group;
  }
  .task-check {
    width: 18px; height: 18px;
    border-radius: 6px;
    border: 2px solid var(--border);
    cursor: pointer;
    transition: all 0.2s;
    flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    color: transparent;
  }
  .task-item.checked .task-check { background: var(--green); border-color: var(--green); color: white; }
  .task-item.checked .task-text { color: var(--green); text-decoration: line-through; opacity: 0.7; }
  .task-text { flex-grow: 1; outline: none; padding: 2px 4px; border-radius: 4px; border: 1px solid transparent; }
  .task-text:focus { background: rgba(255,255,255,0.05); border-color: var(--gold); }

  .btn-remove-task { opacity: 0; color: var(--red); cursor: pointer; font-size: 1rem; padding: 2px; }
  .task-item:hover .btn-remove-task { opacity: 1; }

  .add-task-btn {
    color: var(--gold);
    font-size: 0.8rem;
    font-weight: 700;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 6px;
    opacity: 0.7;
    transition: opacity 0.2s;
  }
  .add-task-btn:hover { opacity: 1; }

  /* PROJECT TABS STYLE */
  .card.status-done { border-left: 4px solid var(--green); }
  .card.status-active { border-left: 4px solid var(--gold); }
  .card.status-todo { border-left: 4px solid var(--muted); }

  .status-pill {
    font-size: 0.65rem;
    font-weight: 900;
    text-transform: uppercase;
    padding: 2px 10px;
    border-radius: 20px;
    letter-spacing: 0.5px;
  }
  .status-pill.done { background: rgba(34, 197, 94, 0.1); color: var(--green); }
  .status-pill.active { background: rgba(245, 200, 66, 0.1); color: var(--gold); }
  .status-pill.todo { background: rgba(148, 163, 184, 0.1); color: var(--muted); }

  /* OVERLAY FOR ADDING PROJECT */
  .add-card-placeholder {
    border: 2px dashed var(--border);
    background: transparent;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    color: var(--muted);
    cursor: pointer;
    min-height: 250px;
    border-radius: 20px;
    transition: all 0.3s;
  }
  .add-card-placeholder:hover { border-color: var(--gold); color: var(--gold); background: rgba(245,200,66,0.05); }

  /* FLOAT SAVE */
  .save-notification {
    position: fixed;
    bottom: 30px;
    right: 30px;
    background: var(--green);
    color: white;
    padding: 12px 24px;
    border-radius: 50px;
    font-weight: 700;
    box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    display: flex;
    align-items: center;
    gap: 10px;
    transform: translateY(100px);
    transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    z-index: 2000;
  }
  .save-notification.show { transform: translateY(0); }

  /* FOOTER */
  footer { padding: 40px; text-align: center; border-top: 1px solid var(--border); color: var(--muted); font-size: 0.8rem; }

</style>
</head>
<body>

<div class="studio-header">
  <div class="logo">Sommers<span>Store</span> Studio v3.0</div>
  <div class="actions">
    <button class="btn btn-outline" onclick="exportData()">📤 Exportar JSON</button>
    <button class="btn btn-danger" onclick="resetData()">♻️ Resetar Tudo</button>
    <button class="btn btn-primary" onclick="saveToLocal()">💾 Salvar Alterações</button>
  </div>
</div>

<div class="tabs-container" id="tabs-bar">
  <!-- Tabs will be rendered here -->
</div>

<div id="content-area">
  <!-- Content will be rendered here -->
</div>

<div class="save-notification" id="save-note">
  <span>✓</span> Alterações salvas com sucesso!
</div>

<footer>
  SommersStore Mindmap Studio — Gerencie seu negócio digital com clareza visual.
</footer>

<script>
// INITIAL DATA
const defaultData = {
  projects: [
    {
      id: "arq",
      name: "🏗️ Arquitetura",
      phases: [
        {
          id: 1,
          icon: "🗂️",
          title: "projects/",
          desc: "Cada produto tem sua pasta isolada.",
          status: "done",
          tasks: [
            { text: "projects/loja-digital/ (Sais de Banho)", checked: true },
            { text: "projects/electro-store/", checked: true },
            { text: "projects/como-plantar/ (futuro)", checked: false }
          ]
        },
        {
          id: 2,
          icon: "🧠",
          title: "knowledge/",
          desc: "Base de conhecimento que alimenta os agentes de IA.",
          status: "done",
          tasks: [
            { text: "audience/ (avatar)", checked: true },
            { text: "copy_frameworks/ (PAS, AIDA…)", checked: true },
            { text: "prompts/ (mestres)", checked: true }
          ]
        }
      ]
    },
    {
      id: "sais",
      name: "🌿 Sais de Banho",
      phases: [
        {
          id: 1,
          icon: "🔍",
          title: "Pesquisa & Avatar",
          desc: "Definição do público-alvo e mapeamento de dores.",
          status: "done",
          tasks: [
            { text: "Avatar definido", checked: true },
            { text: "Dores e desejos mapeados", checked: true }
          ]
        },
        {
          id: 2,
          icon: "💻",
          title: "Páginas & VSL",
          desc: "Desenvolvimento das páginas de venda.",
          status: "active",
          tasks: [
            { text: "Página V3 Light publicada", checked: true },
            { text: "VSL com delay 2m15s", checked: true },
            { text: "Fanpage/Bridge Page", checked: false }
          ]
        }
      ]
    }
  ]
};

let store = JSON.parse(localStorage.getItem('ss_mindmap_data')) || defaultData;
let activeTabId = store.projects[0].id;

// RENDER ENGINE
function render() {
  const tabsBar = document.getElementById('tabs-bar');
  const contentArea = document.getElementById('content-area');
  
  // Render Tabs
  tabsBar.innerHTML = '';
  store.projects.forEach(p => {
    const tab = document.createElement('div');
    tab.className = `tab ${p.id === activeTabId ? 'active' : ''}`;
    tab.innerText = p.name;
    tab.onclick = () => { activeTabId = p.id; render(); };
    tabsBar.appendChild(tab);
  });
  
  const addTab = document.createElement('div');
  addTab.className = 'tab';
  addTab.innerHTML = '+ Novo Projeto';
  addTab.onclick = createNewProject;
  tabsBar.appendChild(addTab);

  // Render Content
  const project = store.projects.find(p => p.id === activeTabId);
  contentArea.innerHTML = `
    <div class="content active">
      <div class="section-header">
        <h2 contenteditable="true" onblur="updateProjectName(this)">${project.name}</h2>
        <p>Roadmap e estrutura do projeto. Clique nos textos para editar.</p>
      </div>
      <div class="mindmap-grid">
        ${project.phases.map((phase, phaseIdx) => `
          <div class="card status-${phase.status}">
            <div class="card-header">
              <span class="card-icon" contenteditable="true" onblur="updatePhaseIcon(${phaseIdx}, this)">${phase.icon}</span>
              <span class="status-pill ${phase.status}" onclick="cycleStatus(${phaseIdx})">${phase.status === 'done' ? 'Concluído' : phase.status === 'active' ? 'Ativo' : 'Pendente'}</span>
              <button class="btn btn-danger" style="padding:4px 8px; font-size:10px" onclick="removePhase(${phaseIdx})">×</button>
            </div>
            <div class="card-title" contenteditable="true" onblur="updatePhaseTitle(${phaseIdx}, this)">${phase.title}</div>
            <div class="card-desc" contenteditable="true" onblur="updatePhaseDesc(${phaseIdx}, this)">${phase.desc}</div>
            
            <ul class="task-list">
              ${phase.tasks.map((task, taskIdx) => `
                <li class="task-item ${task.checked ? 'checked' : ''}">
                  <div class="task-check" onclick="toggleTask(${phaseIdx}, ${taskIdx})">${task.checked ? '✓' : ''}</div>
                  <div class="task-text" contenteditable="true" onblur="updateTaskText(${phaseIdx}, ${taskIdx}, this)">${task.text}</div>
                  <span class="btn-remove-task" onclick="removeTask(${phaseIdx}, ${taskIdx})">×</span>
                </li>
              `).join('')}
            </ul>
            <div class="add-task-btn" onclick="addTask(${phaseIdx})">+ Adicionar Tarefa</div>
          </div>
        `).join('')}
        <div class="add-card-placeholder" onclick="addPhase()">
          <span style="font-size:2rem; margin-bottom:10px">+</span>
          <span>Adicionar Fase</span>
        </div>
      </div>
    </div>
  `;
}

// HANDLERS
function updateProjectName(el) {
  const project = store.projects.find(p => p.id === activeTabId);
  project.name = el.innerText;
  localStorage.setItem('ss_mindmap_data', JSON.stringify(store));
  render(); // Update tab name too
}

function updatePhaseIcon(pIdx, el) {
  const project = store.projects.find(p => p.id === activeTabId);
  project.phases[pIdx].icon = el.innerText;
  saveDataQuietly();
}

function updatePhaseTitle(pIdx, el) {
  const project = store.projects.find(p => p.id === activeTabId);
  project.phases[pIdx].title = el.innerText;
  saveDataQuietly();
}

function updatePhaseDesc(pIdx, el) {
  const project = store.projects.find(p => p.id === activeTabId);
  project.phases[pIdx].desc = el.innerText;
  saveDataQuietly();
}

function cycleStatus(pIdx) {
  const project = store.projects.find(p => p.id === activeTabId);
  const states = ['todo', 'active', 'done'];
  const current = project.phases[pIdx].status;
  project.phases[pIdx].status = states[(states.indexOf(current) + 1) % 3];
  render();
}

function toggleTask(pIdx, tIdx) {
  const project = store.projects.find(p => p.id === activeTabId);
  project.phases[pIdx].tasks[tIdx].checked = !project.phases[pIdx].tasks[tIdx].checked;
  render();
}

function updateTaskText(pIdx, tIdx, el) {
  const project = store.projects.find(p => p.id === activeTabId);
  project.phases[pIdx].tasks[tIdx].text = el.innerText;
  saveDataQuietly();
}

function addTask(pIdx) {
  const project = store.projects.find(p => p.id === activeTabId);
  project.phases[pIdx].tasks.push({ text: "Nova tarefa...", checked: false });
  render();
}

function removeTask(pIdx, tIdx) {
  const project = store.projects.find(p => p.id === activeTabId);
  project.phases[pIdx].tasks.splice(tIdx, 1);
  render();
}

function addPhase() {
  const project = store.projects.find(p => p.id === activeTabId);
  project.phases.push({
    id: Date.now(),
    icon: "🚀",
    title: "Nova Fase",
    desc: "Descreva o que será feito aqui...",
    status: "todo",
    tasks: [{ text: "Primeira tarefa", checked: false }]
  });
  render();
}

function removePhase(pIdx) {
  if (confirm("Deseja realmente remover esta fase?")) {
    const project = store.projects.find(p => p.id === activeTabId);
    project.phases.splice(pIdx, 1);
    render();
  }
}

function createNewProject() {
  const name = prompt("Nome do novo projeto:");
  if (name) {
    const id = name.toLowerCase().replace(/\s+/g, '-').replace(/[^\w-]/g, '');
    store.projects.push({
      id: id || Date.now().toString(),
      name: name,
      phases: []
    });
    activeTabId = id;
    render();
  }
}

// GLOBAL ACTIONS
function saveToLocal() {
  localStorage.setItem('ss_mindmap_data', JSON.stringify(store));
  const note = document.getElementById('save-note');
  note.classList.add('show');
  setTimeout(() => note.classList.remove('show'), 3000);
}

function saveDataQuietly() {
  localStorage.setItem('ss_mindmap_data', JSON.stringify(store));
}

function resetData() {
  if (confirm("Isso apagará todas as suas edições e voltará ao padrão. Continuar?")) {
    store = defaultData;
    localStorage.removeItem('ss_mindmap_data');
    render();
  }
}

function exportData() {
  const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(store, null, 2));
  const downloadAnchorNode = document.createElement('a');
  downloadAnchorNode.setAttribute("href",     dataStr);
  downloadAnchorNode.setAttribute("download", "sommers_store_mindmap.json");
  document.body.appendChild(downloadAnchorNode);
  downloadAnchorNode.click();
  downloadAnchorNode.remove();
}

// START
render();
</script>
</body>
</html>
