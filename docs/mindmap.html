<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>SommersStore — Mindmap Studio v4.0</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;900&display=swap');

  :root {
    --gold: #f5c842;
    --green: #22c55e;
    --blue: #3b82f6;
    --red: #ef4444;
    --dark: #070912;
    --card: #131725;
    --border: #242940;
    --text: #e2e8f0;
    --muted: #64748b;
    --line: rgba(245, 200, 66, 0.2);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Inter', sans-serif;
    background: var(--dark);
    color: var(--text);
    height: 100vh;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  /* HEADER */
  .studio-header {
    background: rgba(7, 9, 18, 0.9);
    backdrop-filter: blur(10px);
    padding: 12px 24px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    z-index: 1000;
  }

  .logo { font-size: 1.1rem; font-weight: 900; }
  .logo span { color: var(--gold); }

  .actions { display: flex; gap: 8px; }
  .btn {
    padding: 6px 12px;
    border-radius: 6px;
    font-size: 0.75rem;
    font-weight: 600;
    cursor: pointer;
    border: 1px solid transparent;
    transition: all 0.2s;
    color: white;
  }
  .btn-primary { background: var(--gold); color: #000; }
  .btn-outline { border-color: var(--border); background: transparent; color: var(--text); }
  .btn-outline:hover { background: var(--card); }
  .btn-danger { background: rgba(239, 68, 68, 0.1); color: var(--red); }

  /* WORKSPACE (PAN/ZOOM) */
  #viewport {
    flex-grow: 1;
    position: relative;
    overflow: hidden;
    cursor: grab;
    background-image: radial-gradient(var(--border) 1px, transparent 1px);
    background-size: 30px 30px;
  }
  #viewport:active { cursor: grabbing; }

  #canvas {
    position: absolute;
    transform-origin: 0 0;
    transition: transform 0.05s linear;
    width: 5000px;
    height: 5000px;
  }

  svg#lines-layer {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
  }

  /* NODES */
  .node {
    position: absolute;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px;
    width: 260px;
    transition: box-shadow 0.3s;
    box-shadow: 0 4px 20px rgba(0,0,0,0.4);
    z-index: 2;
  }
  .node:hover { border-color: var(--gold); box-shadow: 0 4px 25px rgba(245,200,66,0.15); }

  .node-header { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; }
  .node-icon { font-size: 1rem; opacity: 0.8; }
  .node-title { font-weight: 800; font-size: 0.9rem; flex-grow: 1; outline: none; }

  .status-dot { width: 8px; height: 8px; border-radius: 50%; cursor: pointer; }
  .status-todo { background: var(--muted); }
  .status-active { background: var(--gold); box-shadow: 0 0 10px var(--gold); }
  .status-done { background: var(--green); }

  .node-desc { font-size: 0.75rem; color: var(--muted); margin-bottom: 12px; line-height: 1.4; outline: none; }

  /* TASKS */
  .task-list { list-style: none; border-top: 1px solid var(--border); padding-top: 10px; }
  .task-item { display: flex; align-items: flex-start; gap: 8px; font-size: 0.75rem; margin-bottom: 6px; }
  .task-check {
    width: 14px; height: 14px; border: 1.5px solid var(--border); border-radius: 3px;
    cursor: pointer; flex-shrink: 0; margin-top: 2px;
    display: flex; align-items: center; justify-content: center; font-size: 10px;
  }
  .task-item.checked .task-check { background: var(--green); border-color: var(--green); color: white; }
  .task-item.checked .task-text { color: var(--green); text-decoration: line-through; opacity: 0.6; }
  .task-text { flex-grow: 1; outline: none; }

  /* CENTER NODE */
  .center-node {
    position: absolute;
    background: linear-gradient(135deg, var(--gold), #b48a04);
    color: #000;
    padding: 20px 40px;
    border-radius: 50px;
    font-weight: 900;
    font-size: 1.2rem;
    z-index: 10;
    box-shadow: 0 0 40px rgba(245,200,66,0.3);
    white-space: nowrap;
    outline: none;
  }

  /* ZOOM CONTROLS */
  .controls {
    position: fixed;
    bottom: 24px;
    left: 24px;
    display: flex;
    flex-direction: column;
    gap: 8px;
    z-index: 2000;
  }
  .ctrl-btn {
    width: 40px; height: 40px;
    background: var(--card);
    border: 1px solid var(--border);
    color: white;
    font-size: 1.2rem;
    border-radius: 8px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
  }

  /* TABS */
  #tabs {
    display: flex;
    gap: 12px;
    margin-right: 20px;
  }
  .tab {
    padding: 6px 14px;
    background: transparent;
    color: var(--muted);
    font-size: 0.8rem;
    font-weight: 700;
    cursor: pointer;
    border-radius: 6px;
  }
  .tab.active { color: var(--gold); background: rgba(245,200,66,0.1); }

  /* HELPERS */
  .save-note {
    position: fixed; top: 80px; left: 50%; transform: translateX(-50%);
    background: var(--green); color: white; padding: 10px 20px;
    border-radius: 20px; font-weight: 600; font-size: 0.8rem;
    opacity: 0; transition: opacity 0.3s; pointer-events: none;
  }
  .save-note.show { opacity: 1; }

  path.link { fill: none; stroke: var(--line); stroke-width: 2; stroke-dasharray: 4; animation: dash 20s linear infinite; }
  @keyframes dash { from { stroke-dashoffset: 1000; } to { stroke-dashoffset: 0; } }

</style>
</head>
<body oncontextmenu="return false;">

<div class="studio-header">
  <div style="display:flex; align-items:center;">
    <div class="logo" style="margin-right:30px">Sommers<span>Store</span> v4.0</div>
    <div id="tabs"></div>
  </div>
  <div class="actions">
    <button class="btn btn-outline" onclick="addNode()">+ Nova Fase</button>
    <button class="btn btn-outline" onclick="saveData()">💾 Salvar</button>
    <button class="btn btn-danger" onclick="resetData()">♻️ Reset</button>
  </div>
</div>

<div id="viewport">
  <div id="canvas">
    <svg id="lines-layer"></svg>
    <div id="nodes-container"></div>
  </div>
</div>

<div class="controls">
  <button class="ctrl-btn" onclick="adjustZoom(0.1)">+</button>
  <button class="ctrl-btn" onclick="adjustZoom(-0.1)">-</button>
  <button class="ctrl-btn" onclick="resetView()">🎯</button>
</div>

<div class="save-note" id="save-note">Estado salvo com sucesso!</div>

<script>
// DATA
const defaultData = {
  projects: [
    {
      id: "arq", name: "Arquitetura SommersStore",
      nodes: [
        { id: 1, x: 2800, y: 2200, icon: "🗂️", title: "projects/", desc: "Estrutura por produto.", status: "done", tasks: [{text: "loja-digital", checked: true}, {text: "electro-store", checked: true}] },
        { id: 2, x: 2200, y: 2200, icon: "🧠", title: "knowledge/", desc: "Cérebro da IA.", status: "done", tasks: [{text: "avatars", checked: true}, {text: "prompts", checked: true}, {text: "copy frameworks", checked: true}] },
        { id: 3, x: 2500, y: 2800, icon: "⚙️", title: "platform/", desc: "Core de automação.", status: "done", tasks: [{text: "agents", checked: true}, {text: "integrations", checked: true}, {text: "workflows", checked: true}] },
        { id: 4, x: 2500, y: 2200, icon: "🤖", title: "Agentes AIOX", desc: "Equipe especializada.", status: "done", tasks: [{text: "@architect", checked: true}, {text: "@dev", checked: true}, {text: "@copywriter", checked: true}, {text: "@designer", checked: true}] }
      ]
    },
    {
      id: "sais", name: "🌿 Sais de Banho",
      nodes: [
        { id: 10, x: 2100, y: 2300, icon: "🔍", title: "Pesquisa & Avatar", status: "done", tasks: [{text: "Dores e Desejos", checked: true}, {text: "Avatar Essência Ativa", checked: true}] },
        { id: 11, x: 2100, y: 2700, icon: "📝", title: "Copywriting", status: "done", tasks: [{text: "Script VSL 2m15s", checked: true}, {text: "Framework PAS/AIDA", checked: true}] },
        { id: 12, x: 2400, y: 2100, icon: "🎨", title: "Design Landing Page", status: "done", tasks: [{text: "Hero Section Premium", checked: true}, {text: "Prova Social", checked: true}, {text: "Oferta Irresistível", checked: true}] },
        { id: 13, x: 2800, y: 2300, icon: "💻", title: "Construção V3 Light", status: "active", tasks: [{text: "Delay do botão VSL", checked: true}, {text: "Responsividade Mobile", checked: true}, {text: "Fanpage Bridge", checked: true}] },
        { id: 14, x: 2800, y: 2700, icon: "🛒", title: "Integração Checkout", status: "todo", tasks: [{text: "Link Kiwify/Shopify", checked: false}, {text: "Order Bump", checked: false}, {text: "Upsell Flow", checked: false}] },
        { id: 15, x: 2500, y: 3100, icon: "🚀", title: "Tráfego & Métricas", status: "todo", tasks: [{text: "Lançamento Meta Ads", checked: false}, {text: "Análise de ROI", checked: false}] }
      ]
    },
    {
      id: "electro", name: "⚡ Electro Store",
      nodes: [
        { id: 20, x: 2200, y: 2300, icon: "⚙️", title: "Backend Setup", status: "done", tasks: [{text: "Server Next.js Port 3000", checked: true}, {text: "Banco de Dados", checked: true}] },
        { id: 21, x: 2200, y: 2700, icon: "🏠", title: "Home v1 Interface", status: "done", tasks: [{text: "MegaMenu Lateral", checked: true}, {text: "Deal & Tabs", checked: true}, {text: "Header/Footer Premium", checked: true}] },
        { id: 22, x: 2800, y: 2300, icon: "🔌", title: "Integração Shopify/Medusa", status: "active", tasks: [{text: "Sincronização de Produtos", checked: false}, {text: "Webhooks Shopify", checked: false}] },
        { id: 23, x: 2800, y: 2700, icon: "🛍️", title: "Checkout & Pagamento", status: "todo", tasks: [{text: "Stripe/Pix", checked: false}, {text: "Gestão de Pedidos", checked: false}] }
      ]
    },
    {
      id: "velas", name: "🕯️ Velas Aromáticas",
      nodes: [
        { id: 30, x: 2500, y: 2200, icon: "📝", title: "Planejamento Velas", status: "todo", tasks: [{text: "Avatar de Nicho", checked: false}, {text: "Estrutura de Oferta", checked: false}] }
      ]
    }
  ]
};

let store = JSON.parse(localStorage.getItem('ss_mindmap_v4')) || defaultData;
let activeProjId = store.projects[0].id;

// PAN & ZOOM STATE
let zoom = 0.8;
let panX = -2500 * zoom + window.innerWidth/2;
let panY = -2500 * zoom + window.innerHeight/2;
let isPanning = false;
let startX, startY;

const viewport = document.getElementById('viewport');
const canvas = document.getElementById('canvas');
const linesLayer = document.getElementById('lines-layer');
const nodesContainer = document.getElementById('nodes-container');

// CORE RENDER
function render() {
  const tabs = document.getElementById('tabs');
  tabs.innerHTML = '';
  store.projects.forEach(p => {
    const btn = document.createElement('div');
    btn.className = `tab ${p.id === activeProjId ? 'active' : ''}`;
    btn.innerText = p.name;
    btn.onclick = () => { activeProjId = p.id; render(); resetView(); };
    tabs.appendChild(btn);
  });

  const project = store.projects.find(p => p.id === activeProjId);
  nodesContainer.innerHTML = '';
  
  // Center Node
  const center = document.createElement('div');
  center.className = 'center-node';
  center.id = 'node-center';
  center.style.left = '2500px';
  center.style.top = '2500px';
  center.contentEditable = true;
  center.innerText = project.name;
  center.onblur = (e) => { project.name = e.target.innerText; renderTabsOnly(); };
  nodesContainer.appendChild(center);

  // Phases
  project.nodes.forEach(n => {
    const nodeEl = createNodeEl(n, project);
    nodesContainer.appendChild(nodeEl);
  });

  updateLines();
  applyTransform();
}

function createNodeEl(n, project) {
  const div = document.createElement('div');
  div.className = 'node';
  div.style.left = n.x + 'px';
  div.style.top = n.y + 'px';
  
  div.innerHTML = `
    <div class="node-header">
      <span class="node-icon">${n.icon}</span>
      <span class="node-title" contenteditable="true">${n.title}</span>
      <div class="status-dot status-${n.status}" title="Mudar Status"></div>
    </div>
    <div class="node-desc" contenteditable="true">${n.desc || 'Sem descrição...'}</div>
    <ul class="task-list">
      ${n.tasks.map((t, idx) => `
        <li class="task-item ${t.checked ? 'checked' : ''}">
          <div class="task-check" onclick="event.stopPropagation(); toggleTask(${n.id}, ${idx})">${t.checked ? '✓' : ''}</div>
          <div class="task-text" contenteditable="true">${t.text}</div>
        </li>
      `).join('')}
    </ul>
    <div style="font-size:10px; color:var(--gold); cursor:pointer; margin-top:8px" onclick="addTask(${n.id})">+ tarefa</div>
  `;

  // Dragging Logic
  let dragStart = null;
  div.onmousedown = (e) => {
    if (e.target.contentEditable === "true") return;
    e.stopPropagation();
    dragStart = { x: e.clientX, y: e.clientY, nodeX: n.x, nodeY: n.y };
    div.style.cursor = 'grabbing';
    
    const onMove = (me) => {
      const dx = (me.clientX - dragStart.x) / zoom;
      const dy = (me.clientY - dragStart.y) / zoom;
      n.x = dragStart.nodeX + dx;
      n.y = dragStart.nodeY + dy;
      div.style.left = n.x + 'px';
      div.style.top = n.y + 'px';
      updateLines();
    };
    
    const onUp = () => {
      window.removeEventListener('mousemove', onMove);
      window.removeEventListener('mouseup', onUp);
      div.style.cursor = 'grab';
    };
    
    window.addEventListener('mousemove', onMove);
    window.addEventListener('mouseup', onUp);
  };

  // Content Updates
  div.querySelector('.node-title').onblur = (e) => { n.title = e.target.innerText; updateLines(); };
  div.querySelector('.node-desc').onblur = (e) => { n.desc = e.target.innerText; };
  div.querySelector('.status-dot').onclick = (e) => {
    const states = ['todo', 'active', 'done'];
    n.status = states[(states.indexOf(n.status) + 1) % 3];
    render();
  };

  return div;
}

function updateLines() {
  const project = store.projects.find(p => p.id === activeProjId);
  linesLayer.innerHTML = '';
  const cx = 2500 + 100; // center + offset
  const cy = 2500 + 30;

  project.nodes.forEach(n => {
    const nx = n.x + 130;
    const ny = n.y + 10;
    
    const path = document.createElementNS("http://www.w3.org/2000/svg", "path");
    // Bezier curve
    const d = `M ${cx} ${cy} C ${(cx + nx) / 2} ${cy}, ${(cx + nx) / 2} ${ny}, ${nx} ${ny}`;
    path.setAttribute("d", d);
    path.setAttribute("class", "link");
    linesLayer.appendChild(path);
  });
}

function applyTransform() {
  canvas.style.transform = `translate(${panX}px, ${panY}px) scale(${zoom})`;
}

// INTERACTIONS
viewport.onmousedown = (e) => {
  isPanning = true;
  startX = e.clientX - panX;
  startY = e.clientY - panY;
};
window.onmousemove = (e) => {
  if (!isPanning) return;
  panX = e.clientX - startX;
  panY = e.clientY - startY;
  applyTransform();
};
window.onmouseup = () => isPanning = false;

viewport.onwheel = (e) => {
  e.preventDefault();
  const step = e.deltaY > 0 ? -0.05 : 0.05;
  adjustZoom(step, e.clientX, e.clientY);
};

function adjustZoom(step, centerX = window.innerWidth/2, centerY = window.innerHeight/2) {
  const newZoom = Math.min(Math.max(zoom + step, 0.2), 2);
  const ratio = newZoom / zoom;
  panX = centerY - (centerY - panX) * ratio; // Using mouse pos relative logic
  panX = centerX - (centerX - panX) * ratio;
  panY = centerY - (centerY - panY) * ratio;
  zoom = newZoom;
  applyTransform();
}

function resetView() {
  zoom = 0.8;
  panX = -2500 * zoom + window.innerWidth/2;
  panY = -2500 * zoom + window.innerHeight/2;
  applyTransform();
}

function toggleTask(nid, tidx) {
  const project = store.projects.find(p => p.id === activeProjId);
  const node = project.nodes.find(n => n.id === nid);
  node.tasks[tidx].checked = !node.tasks[tidx].checked;
  render();
}

function addTask(nid) {
  const project = store.projects.find(p => p.id === activeProjId);
  const node = project.nodes.find(n => n.id === nid);
  node.tasks.push({ text: "Nova tarefa", checked: false });
  render();
}

function addNode() {
  const project = store.projects.find(p => p.id === activeProjId);
  project.nodes.push({
    id: Date.now(),
    x: 2500 + (Math.random()*400-200),
    y: 2500 + (Math.random()*400-200),
    icon: "📌",
    title: "Nova Fase",
    desc: "Editar...",
    status: "todo",
    tasks: []
  });
  render();
}

function renderTabsOnly() {
  const tabs = document.getElementById('tabs');
  tabs.innerHTML = '';
  store.projects.forEach(p => {
    const btn = document.createElement('div');
    btn.className = `tab ${p.id === activeProjId ? 'active' : ''}`;
    btn.innerText = p.name;
    btn.onclick = () => { activeProjId = p.id; render(); resetView(); };
    tabs.appendChild(btn);
  });
}

function saveData() {
  localStorage.setItem('ss_mindmap_v4', JSON.stringify(store));
  const note = document.getElementById('save-note');
  note.classList.add('show');
  setTimeout(() => note.classList.remove('show'), 2000);
}

function resetData() {
  if(confirm("Deseja resetar para o modelo original?")) {
    store = defaultData;
    localStorage.removeItem('ss_mindmap_v4');
    render();
    resetView();
  }
}

window.onload = render;

</script>
</body>
</html>
