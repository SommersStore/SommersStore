<!DOCTYPE html>
<html lang="pt-BR" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Antigravity · Intelligence Tower</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: { 
                        sans: ['Inter', 'sans-serif'],
                        mono: ['JetBrains Mono', 'monospace']
                    },
                    colors: {
                        background: '#0a0a0f',
                        surface: '#0d0d14',
                        card: '#13131f',
                        border: 'rgba(255, 255, 255, 0.06)',
                        primary: '#a855f7', // Purple/Indigo from Base44
                        secondary: '#10b981', // Emerald
                        accent: '#f59e0b', // Amber
                        muted: '#6b7280'
                    }
                }
            }
        }
    </script>
    <style>
        body { background-color: #0a0a0f; color: #e5e7eb; overflow: hidden; }
        .sidebar-icon { @apply p-2 rounded-lg transition-all duration-200 cursor-pointer text-muted hover:text-white hover:bg-white/5; }
        .sidebar-icon.active { @apply bg-primary/10 text-primary border border-primary/20; }
        
        .node-card { @apply bg-card border border-border rounded-xl p-4 shadow-xl transition-all cursor-move relative overflow-hidden; min-width: 200px; }
        .node-card::before { content: ''; position: absolute; left: 0; top: 0; width: 3px; height: 100%; }
        
        .flow-line { position: absolute; pointer-events: none; height: 2px; background: linear-gradient(90deg, #a855f7, #10b981); opacity: 0.4; z-index: 0; }
        
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        
        .btn-primary { @apply px-4 py-2 bg-primary text-white rounded-lg font-semibold text-sm hover:opacity-90 transition-all flex items-center gap-2; }
        
        .tab-pane { display: none; height: calc(100vh - 64px); }
        .tab-pane.active { display: flex; }

        .tag { @apply px-2 py-0.5 rounded text-[10px] uppercase font-bold tracking-wider; }
        .tag-active { @apply bg-secondary/10 text-secondary border border-secondary/20; }
    </style>
</head>
<body class="h-screen flex flex-col antialiased">

    <!-- Top Navigation (Header) -->
    <header class="h-16 border-b border-white/5 flex items-center justify-between px-6 bg-background/80 backdrop-blur-md z-50">
        <div class="flex items-center gap-4">
            <div class="flex items-center gap-2">
                <div class="w-8 h-8 rounded bg-primary flex items-center justify-center font-bold text-white text-xs">AG</div>
                <h1 class="font-bold text-sm tracking-tight">The Black Protocol <span class="text-muted font-normal">· Master Edition</span></h1>
            </div>
            <div class="h-4 w-px bg-white/10 mx-2"></div>
            <div class="flex items-center gap-2">
                <div class="h-2 w-2 rounded-full bg-secondary animate-pulse shadow-[0_0_8px_#10b981]"></div>
                <span class="text-[10px] text-muted uppercase tracking-widest font-bold">Vibration Scale: Active</span>
            </div>
        </div>
        
        <div class="flex items-center gap-3">
            <button onclick="syncData()" class="text-xs text-muted hover:text-white flex items-center gap-1.5 px-3 py-1.5 rounded-lg border border-white/5 hover:bg-white/5 transition-all">
                <i data-lucide="refresh-cw" class="w-3.5 h-3.5"></i> Sincronizar
            </button>
            <button class="btn-primary">
                <i data-lucide="save" class="w-4 h-4"></i> Salvar Layout
            </button>
        </div>
    </header>

    <div class="flex flex-1 overflow-hidden">
        <!-- Sidebar Navigation -->
        <aside class="w-16 border-r border-white/5 flex flex-col items-center py-6 gap-6 bg-surface/50">
            <div data-tab="builder" class="sidebar-icon active" title="Ebook Builder"><i data-lucide="layout-grid"></i></div>
            <div data-tab="squads" class="sidebar-icon" title="Squads"><i data-lucide="users"></i></div>
            <div data-tab="agents" class="sidebar-icon" title="Agentes"><i data-lucide="bot"></i></div>
            <div data-tab="skills" class="sidebar-icon" title="Skills Library"><i data-lucide="zap"></i></div>
            <div class="mt-auto sidebar-icon" title="Settings"><i data-lucide="settings"></i></div>
        </aside>

        <!-- Main Content Area -->
        <div class="flex-1 relative bg-background overflow-hidden tab-content">
            
            <!-- Tab: Ebook Builder (Flow Style) -->
            <div id="pane-builder" class="tab-pane active flex-col">
                <!-- Flow Toolbox -->
                <div class="absolute left-6 top-6 w-48 z-10 glass-card bg-surface/80 border border-white/5 rounded-xl p-4 flex flex-col gap-3">
                    <p class="text-[10px] font-bold text-muted uppercase tracking-widest mb-1">Nós Disponíveis</p>
                    <div class="flex items-center gap-2 p-2 rounded bg-white/5 border border-white/5 text-xs text-secondary"><i data-lucide="play-circle" class="w-3 h-3"></i> Trigger</div>
                    <div class="flex items-center gap-2 p-2 rounded bg-white/5 border border-white/5 text-xs text-primary"><i data-lucide="cpu" class="w-3 h-3"></i> Agente LLM</div>
                    <div class="flex items-center gap-2 p-2 rounded bg-white/5 border border-white/5 text-xs text-accent"><i data-lucide="wrench" class="w-3 h-3"></i> Ferramenta</div>
                    <div class="flex items-center gap-2 p-2 rounded bg-white/5 border border-white/5 text-xs text-blue-400"><i data-lucide="git-branch" class="w-3 h-3"></i> Condição</div>
                </div>

                <!-- Canvas -->
                <div class="flex-1 overflow-hidden relative" id="flow-canvas" style="background-image: radial-gradient(rgba(255,255,255,0.03) 1px, transparent 0); background-size: 24px 24px;">
                    <!-- Flow Nodes will be injected here -->
                    <div id="flow-nodes" class="relative w-full h-full"></div>
                </div>

                <!-- Canvas Controls -->
                <div class="absolute bottom-6 left-1/2 -translate-x-1/2 bg-surface/90 border border-white/10 px-4 py-2 rounded-full flex items-center gap-4 shadow-2xl">
                    <button class="p-1 px-3 hover:bg-white/10 rounded font-bold text-lg">+</button>
                    <div class="text-[10px] font-mono text-muted uppercase tracking-widest">Zoom: 100%</div>
                    <button class="p-1 px-3 hover:bg-white/10 rounded font-bold text-lg">-</button>
                    <button class="text-[10px] font-bold text-primary hover:underline">RESET VIEW</button>
                </div>
            </div>

            <!-- Tab: Squads -->
            <div id="pane-squads" class="tab-pane flex-col p-8 overflow-y-auto w-full max-w-4xl mx-auto scrollbar-hide">
                <div class="flex items-center justify-between mb-8">
                    <div class="flex items-center gap-2">
                        <i data-lucide="users" class="text-primary w-5 h-5"></i>
                        <h2 class="text-lg font-bold">Squads Ativos <span id="squad-count" class="ml-2 text-xs font-normal text-muted bg-white/5 px-2 py-0.5 rounded">0</span></h2>
                    </div>
                    <button class="btn-primary text-xs"><i data-lucide="plus" class="w-4 h-4"></i> Novo Squad</button>
                </div>
                <div id="squad-grid" class="flex flex-col gap-4"></div>
            </div>

            <!-- Tab: Agentes -->
            <div id="pane-agents" class="tab-pane flex-col p-8 overflow-y-auto w-full max-w-5xl mx-auto scrollbar-hide">
                <div class="flex items-center justify-between mb-8">
                    <div class="flex items-center gap-2">
                        <i data-lucide="bot" class="text-primary w-5 h-5"></i>
                        <h2 class="text-lg font-bold">Rede Neural de Agentes</h2>
                    </div>
                </div>
                <div id="agent-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></div>
            </div>

            <!-- Tab: Skills -->
            <div id="pane-skills" class="tab-pane flex-col p-8 overflow-y-auto w-full max-w-4xl mx-auto scrollbar-hide">
                <div class="flex items-center justify-between mb-8">
                    <div class="flex items-center gap-2">
                        <i data-lucide="zap" class="text-primary w-5 h-5"></i>
                        <h2 class="text-lg font-bold">Knowledge & Skills</h2>
                    </div>
                </div>
                <div id="skills-list" class="space-y-6"></div>
            </div>

        </div>
    </div>

    <script>
        lucide.createIcons();

        // Switch Tabs
        document.querySelectorAll('.sidebar-icon[data-tab]').forEach(el => {
            el.addEventListener('click', () => {
                document.querySelectorAll('.sidebar-icon').forEach(i => i.classList.remove('active'));
                document.querySelectorAll('.tab-pane').forEach(p => p.classList.remove('active'));
                el.classList.add('active');
                document.getElementById('pane-' + el.dataset.tab).classList.add('active');
            });
        });

        const volumes = [
            { id: 'v1', title: 'Vol I: O Preâmbulo', desc: 'Manifesto, Sumário e Abertura', x: 100, y: 150, color: 'primary' },
            { id: 'v2', title: 'Vol II: Atmosfera Mística', desc: 'Introduções Sensoriais', x: 400, y: 150, color: 'secondary' },
            { id: 'v3', title: 'Vol III: Assinaturas', desc: 'Arquétipos Visuais', x: 700, y: 150, color: 'accent' },
            { id: 'v4', title: 'Vol IV: Alquimia', desc: 'Fórmulas e Rituais', x: 400, y: 350, color: 'primary' },
            { id: 'v5', title: 'Vol V: Matéria Visual', desc: 'Galeria HD Botânica', x: 700, y: 350, color: 'secondary' }
        ];

        function renderFlow() {
            const container = document.getElementById('flow-nodes');
            container.innerHTML = '';
            volumes.forEach(v => {
                const node = document.createElement('div');
                node.className = `node-card absolute border-${v.color}/40 p-4`;
                node.style.left = `${v.x}px`;
                node.style.top = `${v.y}px`;
                node.innerHTML = `
                    <div class="flex items-center gap-2 mb-2">
                        <div class="w-2 h-2 rounded-full bg-${v.color}"></div>
                        <span class="text-[10px] font-bold uppercase tracking-widest text-${v.color}">Workflow Node</span>
                        <div class="ml-auto flex gap-1">
                            <i data-lucide="chevron-down" class="w-3 h-3 text-muted"></i>
                            <i data-lucide="x" class="w-3 h-3 text-muted"></i>
                        </div>
                    </div>
                    <h3 class="text-xs font-bold text-white mb-1">${v.title}</h3>
                    <p class="text-[10px] text-muted leading-tight">${v.desc}</p>
                    <div class="mt-4 flex items-center justify-between">
                        <div class="w-3 h-3 rounded-full border-2 border-${v.color} -ml-6 bg-background"></div>
                        <div class="w-3 h-3 rounded-full border-2 border-${v.color} -mr-6 bg-background"></div>
                    </div>
                `;
                container.appendChild(node);
            });
            lucide.createIcons();
        }

        async function syncData() {
            try {
                const res = await fetch('/api/data');
                const data = await res.json();
                
                // Render Squads
                const sqGrid = document.getElementById('squad-grid');
                const sqCount = document.getElementById('squad-count');
                sqGrid.innerHTML = '';
                let count = 0;
                for(let key in data.squads){
                    count++;
                    const s = data.squads[key];
                    const name = s.match(/name:\s*"(.*?)"/)?.[1] || "Squad";
                    const desc = s.match(/description:\s*"(.*?)"/)?.[1] || "Sem descrição";
                    const roles = s.split('roles:')[1]?.split('- id:').slice(1).length || 0;
                    
                    sqGrid.innerHTML += `
                        <div class="bg-surface border border-white/5 rounded-xl p-5 hover:border-white/10 transition-all flex items-center gap-6">
                            <div class="w-12 h-12 rounded-lg bg-primary/10 border border-primary/20 flex items-center justify-center text-primary">
                                <i data-lucide="users"></i>
                            </div>
                            <div class="flex-1">
                                <div class="flex items-center gap-3">
                                    <h3 class="font-bold text-sm">${name}</h3>
                                    <span class="px-1.5 py-0.5 rounded bg-surface border border-white/10 text-[9px] text-muted-foreground font-bold uppercase">${roles} agentes</span>
                                </div>
                                <p class="text-xs text-muted mt-1 leading-relaxed">${desc}</p>
                            </div>
                            <div class="flex items-center gap-2">
                                <span class="tag tag-active">Active</span>
                                <div class="flex flex-col gap-1">
                                    <button class="p-1.5 rounded bg-white/5 hover:bg-white/10 text-muted"><i data-lucide="edit-3" class="w-3.5 h-3.5"></i></button>
                                    <button class="p-1.5 rounded bg-white/5 hover:bg-white/10 text-muted"><i data-lucide="trash-2" class="w-3.5 h-3.5"></i></button>
                                </div>
                            </div>
                        </div>
                    `;
                }
                sqCount.innerText = count;

                // Render Agents (The 12 Core)
                const agentGrid = document.getElementById('agent-grid');
                agentGrid.innerHTML = '';
                const core = [
                    { name: 'Orion', handle: '@aiox-master', role: 'Orquestrador Mestre', icon: '🧠', skills: ['Governança', 'Decision Control'] },
                    { name: 'Aria', handle: '@architect', role: 'Architect & Tech Strategy', icon: '🏗️', skills: ['System Design', 'React/Next'] },
                    { name: 'Sage', handle: '@copywriter', role: 'High Conversion Copy', icon: '✍️', skills: ['Psychology', 'Hooks'] },
                    { name: 'Uma', handle: '@ux-design-expert', role: 'UI/UX Visual Expert', icon: '🎨', skills: ['Brand Guide', 'Motion'] },
                    { name: 'Dex', handle: '@dev', role: 'Frontend Engineer', icon: '💻', skills: ['Tailwind', 'TS/JS'] },
                    { name: 'Dara', handle: '@data-engineer', role: 'Data Integrity', icon: '🗄️', skills: ['Structure', 'Modeling'] },
                    { name: 'Quinn', handle: '@qa', role: 'Quality Assurance', icon: '✅', skills: ['Validation', 'Checks'] },
                    { name: 'Gage', handle: '@devops', role: 'Deployment / Infra', icon: '🚀', skills: ['Vercel', 'Firebase'] },
                    { name: 'Morgan', handle: '@pm', role: 'Product Manager', icon: '📋', skills: ['Epics', 'Pipeline'] },
                    { name: 'Pax', handle: '@po', role: 'Product Owner', icon: '🟢', skills: ['Backlog', 'Stories'] },
                    { name: 'River', handle: '@sm', role: 'Scrum Master', icon: '🌊', skills: ['Sprint', 'Velocity'] },
                    { name: 'Alex', handle: '@analyst', role: 'Market Analyst', icon: '🔍', skills: ['KPIs', 'Market'] }
                ];
                core.forEach(a => {
                    agentGrid.innerHTML += `
                        <div class="node-card border-white/5 group hover:border-primary/20 transition-all">
                            <div class="flex items-center gap-3 mb-4">
                                <div class="w-10 h-10 rounded-full bg-white/5 border border-white/10 flex items-center justify-center text-xl">${a.icon}</div>
                                <div>
                                    <h4 class="font-bold text-xs text-white">${a.name}</h4>
                                    <p class="text-[9px] font-bold text-primary uppercase tracking-widest">${a.handle}</p>
                                </div>
                            </div>
                            <p class="text-[10px] text-muted mb-4 leading-tight h-8 overflow-hidden">${a.role}</p>
                            <div class="flex flex-wrap gap-1.5 pt-3 border-t border-white/5">
                                ${a.skills.map(s => `<span class="px-2 py-0.5 rounded text-[8px] bg-primary/10 text-primary border border-primary/20 font-bold uppercase">${s}</span>`).join('')}
                            </div>
                        </div>
                    `;
                });

                // Render Skills (Dictionary style)
                const skillsList = document.getElementById('skills-list');
                skillsList.innerHTML = `
                    <div class="flex flex-col gap-6">
                        <div class="space-y-4">
                            <div class="flex items-center gap-2 text-[10px] font-bold text-primary tracking-widest uppercase">
                                <div class="h-2 w-2 rounded-full bg-primary mb-0.5"></div> Analysis (1)
                            </div>
                            <div class="bg-surface border border-white/5 rounded-xl p-5">
                                <div class="flex items-center justify-between mb-2">
                                    <h3 class="text-xs font-bold font-mono">Análise de Funil <span class="tag tag-active ml-2">active</span></h3>
                                    <div class="flex gap-2">
                                        <button class="p-1 text-muted"><i data-lucide="edit-2" class="w-3.5 h-3.5"></i></button>
                                        <button class="p-1 text-muted"><i data-lucide="trash" class="w-3.5 h-3.5"></i></button>
                                    </div>
                                </div>
                                <p class="text-[11px] text-muted leading-relaxed">Identifica gargalos e oportunidades no funil de vendas baseado no behavior do avatar.</p>
                                <div class="mt-3"><span class="px-2 py-0.5 rounded text-[9px] font-mono bg-white/5 text-muted-foreground border border-white/10">Lead Qualifier</span></div>
                            </div>
                        </div>
                        <div class="space-y-4">
                            <div class="flex items-center gap-2 text-[10px] font-bold text-secondary tracking-widest uppercase">
                                <div class="h-2 w-2 rounded-full bg-secondary mb-0.5"></div> Automation (2)
                            </div>
                            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                                <div class="bg-surface border border-white/5 rounded-xl p-5">
                                    <h3 class="text-xs font-bold font-mono mb-2">Automação de E-mail <span class="tag tag-active ml-2">active</span></h3>
                                    <p class="text-[11px] text-muted leading-relaxed">Disparo automático via Sendgrid/Mailchimp com réguas de nutrição dinâmica.</p>
                                </div>
                                <div class="bg-surface border border-white/5 rounded-xl p-5">
                                    <h3 class="text-xs font-bold font-mono mb-2">Webhook Integration <span class="tag tag-active ml-2">active</span></h3>
                                    <p class="text-[11px] text-muted leading-relaxed">Integração via webhooks com plataformas externas e gateways de pagamento.</p>
                                </div>
                            </div>
                        </div>
                    </div>
                `;

                lucide.createIcons();
            } catch(e) {
                console.error(e);
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            renderFlow();
            syncData();
        });
    </script>
</body>
</html>
