<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>AIOX Master Next</title>
  <link rel="icon" href="data:,">
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>
    :root {
      --bg:#071014;
      --panel:#0c151b;
      --panel2:#111b23;
      --line:rgba(255,255,255,.10);
      --muted:#82919e;
      --text:#eef6f8;
      --green:#16b981;
      --blue:#38bdf8;
      --gold:#d7a84f;
      --rose:#fb7185;
      --violet:#a78bfa;
    }
    * { box-sizing:border-box; }
    html, body { height:100%; margin:0; background:var(--bg); color:var(--text); font-family:Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Arial, sans-serif; overflow:hidden; }
    button, input, select, textarea { font:inherit; }
    button { cursor:pointer; }
    .app { height:100vh; display:grid; grid-template-columns:72px 1fr; grid-template-rows:56px 1fr; }
    .rail { grid-row:1 / span 2; border-right:1px solid var(--line); background:#091216; display:flex; flex-direction:column; align-items:center; gap:8px; padding:10px 8px; }
    .brand-dot { width:38px; height:38px; border-radius:12px; display:grid; place-items:center; background:linear-gradient(135deg,var(--green),var(--blue)); color:#061114; font-weight:950; letter-spacing:-.08em; }
    .rail-btn { width:46px; height:46px; border:1px solid transparent; border-radius:10px; background:transparent; color:#6f7f8b; display:grid; place-items:center; transition:.16s; }
    .rail-btn.active, .rail-btn:hover { color:var(--text); border-color:rgba(56,189,248,.28); background:rgba(56,189,248,.08); }
    .topbar { grid-column:2; border-bottom:1px solid var(--line); background:rgba(9,18,22,.94); display:flex; align-items:center; gap:10px; padding:8px 14px; min-width:0; }
    .top-title { min-width:154px; }
    .top-title strong { display:block; font-size:12px; letter-spacing:.18em; text-transform:uppercase; }
    .top-title span { display:block; color:var(--muted); font-size:9px; margin-top:2px; text-transform:uppercase; letter-spacing:.12em; white-space:nowrap; }
    .top-select, .top-input { height:34px; border:1px solid var(--line); background:#0e181f; color:var(--text); border-radius:8px; padding:0 10px; min-width:160px; outline:none; }
    .top-spacer { flex:1; min-width:12px; }
    .btn { height:34px; border:1px solid var(--line); color:#dbeafe; background:#101c24; border-radius:8px; padding:0 10px; display:inline-flex; align-items:center; gap:7px; font-weight:850; font-size:10px; text-transform:uppercase; letter-spacing:.08em; white-space:nowrap; transition:.16s; }
    .btn:hover { border-color:rgba(56,189,248,.38); background:#13242e; }
    .btn.primary { background:rgba(22,185,129,.12); border-color:rgba(22,185,129,.34); color:#bbf7d0; }
    .btn.gold { background:rgba(215,168,79,.12); border-color:rgba(215,168,79,.34); color:#fde68a; }
    .btn.active { border-color:rgba(251,191,36,.55); background:rgba(251,191,36,.12); color:#fde68a; }
    .btn.icon { width:34px; justify-content:center; padding:0; }
    .btn:disabled { opacity:.42; cursor:not-allowed; border-color:rgba(255,255,255,.07); background:#0b151b; }
    .stage-tabs { display:flex; gap:6px; }
    .stage-tab { height:30px; border:1px solid var(--line); border-radius:999px; background:rgba(255,255,255,.03); color:var(--muted); padding:0 10px; font-size:9px; font-weight:900; text-transform:uppercase; letter-spacing:.08em; }
    .stage-tab.active { color:var(--text); border-color:rgba(167,139,250,.4); background:rgba(167,139,250,.12); }
    .workspace { grid-column:2; position:relative; overflow:hidden; background:#071014; }
    .canvas-viewport { position:absolute; inset:0; overflow:hidden; background-image:radial-gradient(rgba(148,163,184,.17) 1px, transparent 1px); background-size:28px 28px; }
    .world { position:absolute; left:0; top:0; width:3200px; height:1600px; transform-origin:0 0; }
    .edge-layer { position:absolute; inset:0; width:3200px; height:1600px; overflow:visible; pointer-events:none; }
    .node-layer { position:absolute; inset:0; }
    .node { position:absolute; width:188px; min-height:98px; border:1px solid rgba(148,163,184,.22); background:rgba(12,21,27,.96); border-radius:12px; box-shadow:0 18px 42px rgba(0,0,0,.32); padding:10px 10px 9px; transition:border-color .15s, box-shadow .15s, transform .15s; user-select:none; }
    .node:hover { border-color:rgba(56,189,248,.45); }
    .node.selected { border-color:rgba(56,189,248,.82); box-shadow:0 0 0 2px rgba(56,189,248,.16), 0 22px 48px rgba(0,0,0,.38); }
    .node.connect-source { border-color:rgba(215,168,79,.9); box-shadow:0 0 0 2px rgba(215,168,79,.18); }
    .node.next-action { border-color:rgba(215,168,79,.72); box-shadow:0 0 0 2px rgba(215,168,79,.12), 0 18px 42px rgba(0,0,0,.32); }
    .seq-pill { position:absolute; left:-9px; top:-9px; width:24px; height:24px; border:2px solid #071014; border-radius:999px; background:#d7a84f; color:#071014; display:grid; place-items:center; font-size:10px; font-weight:950; }
    .node-header { display:flex; align-items:flex-start; gap:8px; }
    .node-kind { width:28px; height:28px; border-radius:8px; flex:0 0 auto; display:grid; place-items:center; color:#061114; background:var(--blue); }
    .node-title { min-width:0; flex:1; }
    .node-title strong { display:block; font-size:11px; line-height:1.2; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .node-title span { display:block; color:var(--muted); font-size:8px; margin-top:3px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; text-transform:uppercase; letter-spacing:.08em; }
    .status-dot { width:8px; height:8px; border-radius:999px; margin-top:3px; flex:0 0 auto; box-shadow:0 0 12px currentColor; }
    .node-summary { margin:9px 0 8px; color:#b9c6cf; font-size:9px; line-height:1.35; min-height:24px; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; }
    .node-foot { display:flex; align-items:center; justify-content:space-between; gap:6px; color:var(--muted); font-size:8px; font-weight:850; text-transform:uppercase; letter-spacing:.07em; }
    .node-progress { height:4px; border-radius:999px; background:rgba(255,255,255,.06); overflow:hidden; margin-top:8px; }
    .node-progress span { display:block; height:100%; background:linear-gradient(90deg,var(--green),var(--blue)); }
    .handle { position:absolute; right:-8px; top:50%; width:16px; height:16px; border-radius:999px; transform:translateY(-50%); border:2px solid #071014; background:var(--blue); padding:0; cursor:crosshair; }
    .handle:hover { transform:translateY(-50%) scale(1.18); box-shadow:0 0 0 5px rgba(56,189,248,.16); }
    .connect-guide { position:absolute; left:18px; top:16px; z-index:8; border:1px solid rgba(215,168,79,.34); background:rgba(16,24,30,.94); color:#fde68a; border-radius:10px; padding:9px 12px; font-size:10px; font-weight:900; text-transform:uppercase; letter-spacing:.08em; transform:translateY(-130%); opacity:0; transition:.16s; pointer-events:none; }
    .connect-guide.active { opacity:1; transform:translateY(0); }
    .hint { position:absolute; left:18px; bottom:16px; border:1px solid var(--line); background:rgba(9,18,22,.88); border-radius:10px; color:var(--muted); padding:9px 12px; font-size:10px; display:flex; gap:14px; align-items:center; }
    .zoom-pill { position:absolute; right:18px; bottom:16px; border:1px solid var(--line); background:rgba(9,18,22,.88); border-radius:999px; padding:8px 12px; color:#cbd5e1; font-size:10px; font-weight:900; }
    .drawer { position:absolute; right:14px; top:14px; bottom:14px; width:430px; border:1px solid rgba(255,255,255,.12); background:rgba(10,17,22,.98); box-shadow:0 28px 80px rgba(0,0,0,.46); border-radius:14px; transform:translateX(calc(100% + 24px)); transition:.18s; display:flex; flex-direction:column; z-index:10; overflow:hidden; }
    .drawer.open { transform:translateX(0); }
    .drawer-head { padding:14px; border-bottom:1px solid var(--line); display:flex; align-items:flex-start; gap:10px; }
    .drawer-title { flex:1; min-width:0; }
    .drawer-title strong { display:block; font-size:14px; }
    .drawer-title span { display:block; color:var(--muted); font-size:9px; margin-top:3px; text-transform:uppercase; letter-spacing:.10em; }
    .drawer-body { padding:14px; overflow:auto; display:flex; flex-direction:column; gap:12px; }
    .section { border:1px solid rgba(255,255,255,.08); background:rgba(255,255,255,.025); border-radius:10px; padding:10px; }
    .section-title { color:#dbeafe; font-size:9px; font-weight:950; text-transform:uppercase; letter-spacing:.12em; margin-bottom:8px; display:flex; justify-content:space-between; gap:8px; }
    .field { display:flex; flex-direction:column; gap:5px; margin-bottom:9px; }
    .field label { color:var(--muted); font-size:8px; font-weight:900; text-transform:uppercase; letter-spacing:.08em; }
    .field input, .field select, .field textarea { border:1px solid rgba(255,255,255,.10); background:#0d171e; color:var(--text); border-radius:8px; padding:8px; outline:none; font-size:11px; }
    .field textarea { resize:vertical; min-height:72px; }
    .chips { display:flex; flex-wrap:wrap; gap:6px; }
    .chip { border:1px solid rgba(255,255,255,.10); border-radius:999px; background:rgba(255,255,255,.035); color:#d1d5db; padding:5px 8px; font-size:8px; font-weight:850; }
    .chip button { border:0; background:transparent; color:#94a3b8; margin-left:5px; padding:0; }
    .pick-grid { display:grid; grid-template-columns:1fr 1fr; gap:6px; max-height:150px; overflow:auto; }
    .pick { border:1px solid rgba(255,255,255,.08); background:rgba(255,255,255,.03); color:#dbeafe; border-radius:8px; padding:7px; text-align:left; font-size:9px; line-height:1.25; }
    .pick small { display:block; color:var(--muted); margin-top:3px; }
    .pick.recommended { border-color:rgba(215,168,79,.26); background:rgba(215,168,79,.055); }
    .pick em { display:inline-block; margin-top:5px; border:1px solid rgba(255,255,255,.08); border-radius:999px; padding:2px 5px; color:#fde68a; font-size:7px; font-style:normal; text-transform:uppercase; letter-spacing:.06em; }
    .file-row, .run-row { display:flex; align-items:center; justify-content:space-between; gap:8px; border-bottom:1px solid rgba(255,255,255,.06); padding:7px 0; font-size:10px; color:#cbd5e1; }
    .file-row:last-child, .run-row:last-child { border-bottom:0; }
    .check-row { display:flex; gap:8px; align-items:center; padding:5px 0; color:#cbd5e1; font-size:10px; }
    .check-row input { width:14px; height:14px; }
    .modal { position:absolute; inset:0; background:rgba(2,6,9,.62); display:none; place-items:center; z-index:30; }
    .modal.open { display:grid; }
    .modal-card { width:min(560px, calc(100vw - 36px)); border:1px solid rgba(255,255,255,.14); background:#0c151b; border-radius:14px; box-shadow:0 30px 90px rgba(0,0,0,.5); padding:16px; }
    .modal-card.wide { width:min(820px, calc(100vw - 36px)); }
    .modal-card h2 { margin:0 0 12px; font-size:16px; }
    .modal-actions { display:flex; justify-content:flex-end; gap:8px; margin-top:14px; }
    .template-grid { display:grid; grid-template-columns:repeat(2, minmax(0, 1fr)); gap:9px; max-height:470px; overflow:auto; padding-right:3px; }
    .template-card { border:1px solid rgba(255,255,255,.09); background:rgba(255,255,255,.035); color:#dbeafe; border-radius:10px; padding:10px; text-align:left; min-height:118px; display:flex; flex-direction:column; gap:6px; }
    .template-card:hover { border-color:rgba(56,189,248,.35); background:rgba(56,189,248,.07); }
    .template-card strong { font-size:12px; line-height:1.2; }
    .template-card span { color:var(--muted); font-size:8px; font-weight:900; text-transform:uppercase; letter-spacing:.08em; }
    .template-card small { color:#b9c6cf; font-size:10px; line-height:1.35; }
    .template-meta { margin-top:auto; display:flex; gap:6px; flex-wrap:wrap; }
    .template-meta em { border:1px solid rgba(255,255,255,.09); border-radius:999px; padding:4px 7px; color:#cbd5e1; font-size:8px; font-style:normal; text-transform:uppercase; letter-spacing:.06em; }
    .team-board { display:grid; grid-template-columns:repeat(3,minmax(0,1fr)); gap:7px; }
    .team-card { border:1px solid rgba(255,255,255,.08); background:rgba(255,255,255,.025); border-radius:8px; padding:8px; min-width:0; }
    .team-card strong { display:block; font-size:15px; line-height:1; color:#e0f2fe; }
    .team-card span { display:block; color:var(--muted); font-size:8px; font-weight:900; text-transform:uppercase; letter-spacing:.08em; margin-top:4px; }
    .production-list { margin:0; padding-left:16px; color:#cbd5e1; font-size:10px; line-height:1.55; }
    .production-list li { margin:3px 0; }
    @media (max-width: 920px) {
      .app { grid-template-columns:56px 1fr; grid-template-rows:104px 1fr; }
      .rail { padding:8px 5px; }
      .topbar { flex-wrap:wrap; align-content:center; }
      .stage-tabs { order:3; width:100%; overflow:auto; }
      .drawer { left:70px; right:10px; width:auto; }
      .template-grid { grid-template-columns:1fr; }
    }
  </style>
</head>
<body>
<div class="app">
  <aside class="rail" aria-label="AIOX Next">
    <div class="brand-dot">AX</div>
    <button class="rail-btn active" title="Canvas" data-view="canvas"><i data-lucide="git-branch" width="20"></i></button>
    <button class="rail-btn" title="Agentes" onclick="openLibrary('agents')"><i data-lucide="bot" width="20"></i></button>
    <button class="rail-btn" title="Skills" onclick="openLibrary('skills')"><i data-lucide="sparkles" width="20"></i></button>
    <button class="rail-btn" title="Clones" onclick="openLibrary('personas')"><i data-lucide="users" width="20"></i></button>
  </aside>

  <header class="topbar">
    <div class="top-title"><strong>AIOX Master Next</strong><span id="runtimeLabel">workspace isolado</span></div>
    <select id="projectSelect" class="top-select" onchange="selectProject(this.value)"></select>
    <div class="stage-tabs" id="stageTabs"></div>
    <div class="top-spacer"></div>
    <button class="btn" onclick="openTemplateLibrary()"><i data-lucide="blocks" width="15"></i>Templates</button>
    <button id="undoBtn" class="btn icon" onclick="undoNext()" title="Desfazer"><i data-lucide="undo-2" width="15"></i></button>
    <button id="redoBtn" class="btn icon" onclick="redoNext()" title="Refazer"><i data-lucide="redo-2" width="15"></i></button>
    <button class="btn" onclick="openGuidedProductModal()"><i data-lucide="route" width="15"></i>Produto guiado</button>
    <button class="btn" onclick="openProjectModal()"><i data-lucide="plus" width="15"></i>Novo projeto</button>
    <button class="btn" onclick="openNodeModal()"><i data-lucide="circle-plus" width="15"></i>Novo no</button>
    <button id="connectBtn" class="btn" onclick="toggleConnectMode()"><i data-lucide="link-2" width="15"></i>Conectar</button>
    <button class="btn gold" onclick="runSelectedOrProject()"><i data-lucide="play" width="15"></i>Start/Avancar</button>
    <button class="btn primary" onclick="saveNow()"><i data-lucide="save" width="15"></i>Salvar tudo</button>
  </header>

  <main class="workspace">
    <div id="connectGuide" class="connect-guide">Escolha o no de origem</div>
    <div id="viewport" class="canvas-viewport">
      <div id="world" class="world">
        <svg id="edges" class="edge-layer"></svg>
        <div id="nodes" class="node-layer"></div>
      </div>
    </div>
    <div class="hint"><span>Arraste o fundo para navegar</span><span>Scroll ajusta zoom</span><span>Clique no no para configurar</span></div>
    <div id="zoomPill" class="zoom-pill">100%</div>

    <aside id="drawer" class="drawer" aria-label="Node editor">
      <div class="drawer-head">
        <div class="drawer-title"><strong id="drawerTitle">No selecionado</strong><span id="drawerSub">Configurar workflow</span></div>
        <button class="btn" onclick="closeDrawer()"><i data-lucide="x" width="14"></i></button>
      </div>
      <div id="drawerBody" class="drawer-body"></div>
    </aside>

    <div id="projectModal" class="modal">
      <div class="modal-card">
        <h2>Novo projeto operacional</h2>
        <div class="field"><label>Nome</label><input id="newProjectName" value="Novo Produto Digital"></div>
        <div class="field"><label>Descricao</label><textarea id="newProjectDesc">Fluxo completo para construir e vender um produto digital com squads, agentes, clones e QA.</textarea></div>
        <div class="modal-actions">
          <button class="btn" onclick="closeProjectModal()">Cancelar</button>
          <button class="btn primary" onclick="createProjectFromModal()">Criar agora</button>
        </div>
      </div>
    </div>

    <div id="guidedProductModal" class="modal">
      <div class="modal-card wide">
        <h2>Produto guiado sequencial</h2>
        <div class="field"><label>Produto</label><input id="guidedProductName" value="Velas Aromaticas"></div>
        <div class="field"><label>Entregavel principal</label><input id="guidedMainDeliverable" value="Guia Velas Aromaticas do Zero"></div>
        <div class="field"><label>Free 1</label><input id="guidedFreeOne" value="Checklist de Materiais e Fornecedores"></div>
        <div class="field"><label>Free 2</label><input id="guidedFreeTwo" value="Mini Guia de Aromas e Combinacoes"></div>
        <div class="field"><label>Order Bump 1</label><input id="guidedBumpOne" value="Calculadora de Preco e Lucro"></div>
        <div class="field"><label>Order Bump 2</label><input id="guidedBumpTwo" value="Pack de Etiquetas e Cartoes"></div>
        <div class="modal-actions">
          <button class="btn" onclick="closeGuidedProductModal()">Cancelar</button>
          <button class="btn primary" onclick="createGuidedProductFromModal()">Criar esteira</button>
        </div>
      </div>
    </div>

    <div id="nodeModal" class="modal">
      <div class="modal-card">
        <h2>Novo no no canvas</h2>
        <div class="field"><label>Nome</label><input id="newNodeLabel" value="Novo passo"></div>
        <div class="field"><label>Tipo</label><select id="newNodeType"></select></div>
        <div class="field"><label>Squad</label><select id="newNodeSquad"></select></div>
        <div class="modal-actions">
          <button class="btn" onclick="closeNodeModal()">Cancelar</button>
          <button class="btn primary" onclick="createNodeFromModal()">Adicionar</button>
        </div>
      </div>
    </div>

    <div id="libraryModal" class="modal">
      <div class="modal-card">
        <h2 id="libraryTitle">Biblioteca</h2>
        <div id="libraryBody" class="pick-grid"></div>
        <div class="modal-actions"><button class="btn primary" onclick="closeLibrary()">Fechar</button></div>
      </div>
    </div>

    <div id="templateModal" class="modal">
      <div class="modal-card wide">
        <h2>Templates de workflow</h2>
        <div id="templateBody" class="template-grid"></div>
        <div class="modal-actions">
          <button class="btn" onclick="closeTemplateLibrary()">Fechar</button>
          <button class="btn primary" onclick="closeTemplateLibrary(); openNodeModal()">No em branco</button>
        </div>
      </div>
    </div>
  </main>
</div>

<script>
const NEXT_STATE_KEY = 'aiox.master.next.state.v1';
const NODE_TYPES = [
  ['strategy','Estrategia'], ['market','Mercado'], ['ebook','E-book'], ['copy','Copy'],

];

];

  pending:{label:'Preparando', color:'#a78bfa'},

  {

async function loadState() {

function projectFromMap(id, name, map) {

function ensureCoreNodes(nodes, edges) {

    nodes.push(checkout);
    if (last.id) edges.push({ id:uid('edge'), from:last.id, to:checkout.id, label:'publicar' });

}

function cleanText(text) {

function inferType(node) {

  if (t.includes('checkout') || label.includes('checkout')) return 'checkout';
  if (label.includes('landing') || label.includes('pagina') || t === 'page') return 'page';
  if (label.includes('ebook') || label.includes('pdf') || t === 'ebook') return 'ebook';
  if (label.includes('copy') || label.includes('vsl')) return 'copy';
  if (label.includes('design') || label.includes('layout')) return 'design';
  if (label.includes('qa') || label.includes('teste')) return 'qa';
  if (label.includes('trafego') || label.includes('mercado') || label.includes('persona')) return 'market';
  if (t === 'pipeline') return 'strategy';
  return t && TYPE_COLOR[t] ? t : 'automation';
}
function inferStage(type) {
  if (['strategy','market'].includes(type)) return 'strategy';
  if (['ebook','design'].includes(type)) return 'ebook';
  if (['copy','page','checkout'].includes(type)) return 'sales';
  if (['delivery'].includes(type)) return 'delivery';

function nodeSearchText(node = {}) {

function typeTokensForNode(type, offerType) {
  const tokensByType = {
    strategy:['brief','product','offer','position','roadmap'],
    market:['market','competitor','hook','funnel','traffic','cro'],
    ebook:['editorial','longform','pdf','assembly','brand'],
    delivery:['delivery','pdf','assembly','orchestration','brand'],

    checkout:['checkout','webhook','delivery','price','offer'],

    automation:['automation','webhook','sync','execution']
  };
  const tokensByOffer = {
    setup:['brief','position','offer','roadmap'],
    principal:['editorial','longform','ebook','pdf','html','assembly'],
    free:['lead','checklist','delivery','pdf','assembly'],
    order_bump:['checkout','offer','price','template','pack','delivery'],
    upsell:['upsell','offer','ltv','funnel','checkout'],
    downsell:['downsell','offer','retention','checkout']
  };
  return [type, offerType, ...(tokensByType[type] || []), ...(tokensByOffer[offerType] || [])]
    .map(s => String(s || '').toLowerCase())
    .filter(Boolean);
}
function rankedSkillsForNode({ type, squad, agentIds = [], offerType = '', node = null }) {
  const group = String(squad || '').replace('SQD-','').toLowerCase();
  const tokens = [group, ...typeTokensForNode(type, offerType), ...nodeSearchText(node).split(/\W+/).filter(token => token.length > 4)];
  const scored = app.registry.skills.map(skill => {
    const skillAgents = Array.isArray(skill.agents) ? skill.agents : [];
    const agentScore = skillAgents.some(id => agentIds.includes(id)) ? 3 : 0;
    const squadScore = skillAgents.some(id => agentById(id)?.squad === squad) ? 2 : 0;
    const text = `${skill.id} ${skill.name} ${skill.desc || ''}`.toLowerCase();
    const tokenScore = tokens.reduce((score, token) => score + (text.includes(token) ? 1 : 0), 0);
    const criticalityScore = skill.activation_criticality === 'alta' ? 1 : 0;
    return { skill, score:agentScore + squadScore + tokenScore + criticalityScore, reason:agentScore ? 'agente vinculado' : squadScore ? 'squad' : tokenScore ? 'contexto' : 'apoio' };
  }).filter(item => item.score > 0);
  return scored.sort((a,b) => b.score - a.score || a.skill.name.localeCompare(b.skill.name));
}
function recommendedSkillsForNode(node) {

function rankedPersonasForNode({ type, agentIds = [], offerType = '', node = null }) {
  const byType = {
    strategy:['prs-russell-brunson','prs-alan-nicolas','prs-alex-hormozi'],
    market:['prs-russell-brunson','prs-eugene-schwartz','prs-joanna-wiebe'],
    ebook:['prs-elisa-clark','prs-david-ogilvy','prs-pedro-valerio'],
    delivery:['prs-elisa-clark','prs-david-ogilvy','prs-pedro-valerio'],
    copy:['prs-alan-nicolas','prs-gary-halbert','prs-eugene-schwartz'],
    page:['prs-tiago-finch','prs-pedro-valerio','prs-joanna-wiebe'],
    checkout:['prs-russell-brunson','prs-alex-hormozi','prs-alan-nicolas']
  };
  const handles = agentIds.map(id => agentById(id)).filter(Boolean).flatMap(agent => [agent.handle, agent.id]);
  const preferred = new Set(byType[type] || []);
  const tokens = typeTokensForNode(type, offerType).concat(nodeSearchText(node).split(/\W+/).filter(token => token.length > 4));
  return app.registry.personas.map(persona => {
    const linkedScore = (persona.agents || []).some(agent => handles.includes(agent)) ? 3 : 0;
    const preferredScore = preferred.has(persona.id) ? 3 : 0;
    const text = `${persona.id} ${persona.name} ${persona.role || ''} ${(persona.traits || []).join(' ')} ${persona.bio || ''}`.toLowerCase();
    const tokenScore = tokens.reduce((score, token) => score + (text.includes(token) ? 1 : 0), 0);
    return { persona, score:linkedScore + preferredScore + tokenScore, reason:linkedScore ? 'agente vinculado' : preferredScore ? 'padrao do tipo' : tokenScore ? 'contexto' : 'apoio' };
  }).filter(item => item.score > 0).sort((a,b) => b.score - a.score || a.persona.name.localeCompare(b.persona.name));
}
function recommendedPersonasForNode(node) {
  return rankedPersonasForNode({ type:node.type, agentIds:node.agents || [], offerType:node.offerType, node })
    .filter(item => !(node.personas || []).includes(item.persona.id))

function squadCoverage(squadId) {

  const skills = app.registry.skills.filter(skill => (skill.agents || []).some(id => agentById(id)?.squad === squadId));
  const personas = app.registry.personas.filter(persona => (persona.agents || []).some(handle => agents.some(agent => agent.handle === handle)));
  return { agents:agents.length, skills:skills.length, personas:personas.length };
}
function rankedSquadsForNode(node) {
  const tokens = typeTokensForNode(node.type, node.offerType).concat(nodeSearchText(node).split(/\W+/).filter(token => token.length > 4));
  return app.registry.squads.map(squad => {
    const coverage = squadCoverage(squad.id);
    const text = `${squad.id} ${squad.name || ''} ${squad.mission || ''}`.toLowerCase();
    const tokenScore = tokens.reduce((score, token) => score + (text.includes(token) ? 1 : 0), 0);
    const currentScore = squad.id === node.squad ? 100 : 0;
    return { squad, coverage, score:currentScore + coverage.agents * 3 + coverage.skills + coverage.personas + tokenScore };
  }).sort((a,b) => b.score - a.score || a.squad.name.localeCompare(b.squad.name));

function edgeTemplate(edges, nodeMap) {
  const defs = `<defs><marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto"><path d="M0 0 L10 5 L0 10z" fill="rgba(56,189,248,.76)"/></marker></defs>`;
  return defs + edges.map(edge => {
    const a = nodeMap[edge.from], b = nodeMap[edge.to];
    if (!a || !b) return '';
    const sx = a.x + 188, sy = a.y + 49, tx = b.x, ty = b.y + 49, cx = (sx + tx) / 2;
    return `<path d="M ${sx} ${sy} C ${cx} ${sy}, ${cx} ${ty}, ${tx} ${ty}" fill="none" stroke="rgba(56,189,248,.42)" stroke-width="2" marker-end="url(#arrow)"></path>

}

function applyWorldTransform() {
  $('#world').style.transform = `translate(${app.pan.x}px, ${app.pan.y}px) scale(${app.zoom})`;
  $('#zoomPill').textContent = `${Math.round(app.zoom * 100)}%`;
}
function bindCanvas() {
  const viewport = $('#viewport');
  viewport.addEventListener('wheel', event => {
    event.preventDefault();
    const delta = event.deltaY < 0 ? .08 : -.08;
    app.zoom = Math.max(.28, Math.min(1.8, app.zoom + delta));
    applyWorldTransform();
  }, { passive:false });
  viewport.addEventListener('pointerdown', event => {
    if (event.target.closest('.handle')) return;
    const nodeEl = event.target.closest('.node');
    if (nodeEl) return startNodePointer(event, nodeEl.dataset.nodeId);
    app.panning = { x:event.clientX, y:event.clientY, ox:app.pan.x, oy:app.pan.y };
  });
  window.addEventListener('pointermove', event => {
    if (app.dragging) {
      const node = currentProject().nodes.find(n => n.id === app.dragging.id);
      if (!node) return;
      node.x = Math.round(app.dragging.ox + (event.clientX - app.dragging.x) / app.zoom);
      node.y = Math.round(app.dragging.oy + (event.clientY - app.dragging.y) / app.zoom);
      app.dragging.moved = true;
      renderCanvas();
      scheduleSave();
    } else if (app.panning) {
      app.pan.x = Math.round(app.panning.ox + event.clientX - app.panning.x);
      app.pan.y = Math.round(app.panning.oy + event.clientY - app.panning.y);
      applyWorldTransform();
    }
  });
  window.addEventListener('pointerup', () => {
    if (app.dragging?.moved && app.dragging.snapshot) pushHistory(app.dragging.snapshot);
    app.dragging = null; app.panning = null;
  });
}
function startNodePointer(event, nodeId) {
  const node = currentProject().nodes.find(n => n.id === nodeId);
  if (!node) return;
  selectNode(nodeId);
  if (app.connectMode) return handleConnectClick(nodeId);
  app.dragging = { id:nodeId, x:event.clientX, y:event.clientY, ox:node.x, oy:node.y, moved:false, snapshot:cloneStateForHistory() };
}
function bindShortcuts() {
  window.addEventListener('keydown', event => {
    const key = event.key.toLowerCase();
    const typing = ['INPUT','TEXTAREA','SELECT'].includes(event.target?.tagName);
    if (event.ctrlKey && key === 's') { event.preventDefault(); saveNow(); return; }
    if (!typing && event.ctrlKey && (key === 'y' || (event.shiftKey && key === 'z'))) { event.preventDefault(); redoNext(); return; }
    if (!typing && event.ctrlKey && key === 'z') { event.preventDefault(); undoNext(); return; }
    if (event.key === 'Escape') { cancelConnectMode(); closeDrawer(); renderAll(); return; }
    if (!typing && event.key === 'Delete' && currentNode()) deleteSelectedNode();
  });
}

function handleConnectClick(nodeId) {

      pushHistory();

async function uploadFileToSelected(file) {
  const node = currentNode(); if (!file || !node) return;

    pushHistory();
    node.files ||= [];
    node.files.push({ id:uid('file'), name:file.name, url:data.url, type:file.type || 'file', size:file.size });

function runSelectedOrProject() {
  const project = currentProject();
  const node = currentNode() || nextActionableNode(project) || orderedNodes(project)[0];
  if (!node) return;
  pushHistory();
  let action = 'started';
  if (node.status === 'in_progress') {
    node.status = 'completed';
    action = 'completed';
    const next = nextNodeAfter(project, node);
    if (next) {
      if (next.status === 'draft') next.status = 'pending';
      app.selectedNodeId = next.id;
    } else {
      app.selectedNodeId = node.id;
    }
  } else if (node.status === 'completed') {
    const next = nextActionableNode(project);
    if (next) app.selectedNodeId = next.id;
    action = 'opened_next';
  } else {
    node.status = 'in_progress';
    app.selectedNodeId = node.id;
  }
  project.runs ||= [];
  project.runs.unshift({ id:uid('run'), nodeId:node.id, label:node.label, status:node.status, action, at:new Date().toISOString() });
  renderAll(); scheduleSave();
}
function fitProject(animate = true) {
  const nodes = filteredNodes(currentProject());
  if (!nodes.length) return;
  const minX = Math.min(...nodes.map(n => n.x)), minY = Math.min(...nodes.map(n => n.y));
  const maxX = Math.max(...nodes.map(n => n.x + 188)), maxY = Math.max(...nodes.map(n => n.y + 120));
  const vw = $('#viewport').clientWidth, vh = $('#viewport').clientHeight;
  app.zoom = Math.max(.36, Math.min(1.1, Math.min((vw - 170) / (maxX - minX + 260), (vh - 120) / (maxY - minY + 180))));
  app.pan = { x:Math.round(82 - minX * app.zoom), y:Math.round(70 - minY * app.zoom) };
  if (!animate) $('#world').style.transition = 'none';
  applyWorldTransform();
  requestAnimationFrame(() => $('#world').style.transition = '');
}
async function saveNow() {
  app.state.updated_at = new Date().toISOString();
  localStorage.setItem(NEXT_STATE_KEY, JSON.stringify(app.state));
  const res = await fetch('/api/aiox-master-next/save', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(app.state) });
  if (!res.ok) throw new Error('save failed');
  const btn = document.querySelector('.btn.primary');
  const old = btn.innerHTML; btn.innerHTML = '<i data-lucide="check" width="15"></i>Salvo';
  if (window.lucide) window.lucide.createIcons();
  setTimeout(() => { btn.innerHTML = old; if (window.lucide) window.lucide.createIcons(); }, 1400);
}
function scheduleSave() { clearTimeout(app.saveTimer); app.saveTimer = setTimeout(() => saveNow().catch(console.error), 800); }
