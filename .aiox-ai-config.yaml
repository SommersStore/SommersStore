# ============================================
# AIOX AI Provider Configuration
# ============================================
# Estratégia: Gemini para tarefas técnicas, Claude para copy e estratégia
# Motivo: economizar créditos Claude (USD 2,34) sem comprometer qualidade
# Revisão: quando Claude tiver mais créditos, mover copy_writing para claude
# ============================================

ai_providers:
  primary: claude        # Claude conduz a conversa e decisões
  fallback: vertex       # Gemini como fallback se Claude indisponível
  routing:
    # ── GEMINI (tarefas técnicas — qualidade equivalente, 90% mais barato)
    code_generation: vertex
    code_review: vertex
    documentation: vertex
    testing: vertex
    analysis: vertex
    data_processing: vertex
    research: vertex
    summarization: vertex
    translation: vertex
    file_analysis: vertex

    # ── CLAUDE (copy e estratégia — qualidade crítica para conversão)
    copy_writing: claude
    headlines: claude
    vsl_script: claude
    sales_strategy: claude
    complex_tasks: claude
    architecture: claude
    security: claude
    decision_making: claude

# Configuração do Claude
claude:
  model: claude-sonnet-4-6
  timeout: 300000
  dangerouslySkipPermissions: false

# Configuração do Gemini
vertex:
  model: gemini-2.5-flash
  timeout: 300000
  maxRetries: 3

# Compatibilidade
gemini:
  model: gemini-2.5-flash
  timeout: 300000
  previewFeatures: true
  jsonOutput: false
