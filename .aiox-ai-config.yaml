# ============================================
# AIOX AI Provider Configuration
# ============================================
# Estratégia: Maximizar uso do Gemini (R$1.700 / 90 dias)
# Claude reservado apenas para tarefas críticas
# ============================================

ai_providers:
  primary: vertex        # Gemini como primário (créditos Google)
  fallback: claude       # Claude só como backup
  routing:
    # Gemini executa tudo que puder
    simple_tasks: vertex
    research: vertex
    summarization: vertex
    translation: vertex
    code_review: vertex
    documentation: vertex
    testing: vertex
    analysis: vertex
    copy_writing: vertex
    data_processing: vertex
    # Claude apenas para o mais crítico
    complex_tasks: claude
    architecture: claude
    security: claude

# Configuração do Gemini (provider primário)
vertex:
  model: gemini-2.5-flash       # Modelo mais capaz disponível
  timeout: 300000
  maxRetries: 3

# Configuração do Claude (reserva)
claude:
  model: claude-sonnet-4-6
  timeout: 300000
  dangerouslySkipPermissions: false

# Configuração legada Gemini (compatibilidade)
gemini:
  model: gemini-2.5-flash
  timeout: 300000
  previewFeatures: true
  jsonOutput: false
